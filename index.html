<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>清敲 - 清心鼓</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
body{font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;background:linear-gradient(160deg,#0d0715,#16112e,#0d0d1a);min-height:100vh;color:#c8c0d8;overflow-x:hidden}
.container{max-width:400px;margin:0 auto;padding:12px 14px;position:relative}

/* Header */
.header{display:flex;justify-content:space-between;align-items:center;padding:4px 0 6px}
.header h1{font-size:19px;font-weight:700;color:#b8a8e0;letter-spacing:2px}
.header .stats{display:flex;gap:8px;font-size:11px}
.header .stats span{background:rgba(160,140,200,.08);padding:3px 10px;border-radius:8px;color:#a898c8;display:flex;align-items:center;gap:3px}

/* Sutra Selector */
.sutra-bar{display:flex;align-items:center;gap:6px;margin:4px 0 8px;padding:6px 10px;background:rgba(160,140,200,.04);border-radius:8px;border:1px solid rgba(160,140,200,.06);min-height:36px}
.sutra-bar .label{font-size:10px;color:rgba(160,140,200,.3);letter-spacing:1px;white-space:nowrap}
.sutra-bar .current{flex:1;font-size:12px;color:#b8a8e0;text-align:center;letter-spacing:2px;cursor:pointer}
.sutra-bar .nav-btn{font-size:14px;color:rgba(160,140,200,.25);cursor:pointer;padding:2px 8px;transition:all .2s}
.sutra-bar .nav-btn:active{color:#b8a8e0}

/* Sutra text */
.sutra-box{min-height:44px;display:flex;align-items:center;justify-content:center;margin:0 0 8px;background:rgba(0,0,0,.2);border-radius:6px;border:1px solid rgba(160,140,200,.04)}
.sutra-text{font-size:13px;color:rgba(200,192,216,.45);text-align:center;line-height:1.6;padding:8px 12px;transition:opacity .15s;letter-spacing:.5px;font-family:'Noto Serif SC','STSong',serif}
.sutra-text .hl{color:#a898c8}

/* Sound Select */
.sound-row{display:flex;gap:4px;margin:6px 0 8px;padding:3px;background:rgba(160,140,200,.04);border-radius:8px;border:1px solid rgba(160,140,200,.04);justify-content:center}
.snd-btn{padding:4px 12px;border-radius:5px;border:0;background:transparent;color:rgba(160,140,200,.3);font-size:11px;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.snd-btn.active{background:rgba(160,140,200,.08);color:#b8a8e0}

/* Tap Circle */
.tap-area{text-align:center;padding:8px 0 4px}
.circle-wrap{position:relative;display:inline-block;cursor:pointer;touch-action:manipulation}
.circle{width:186px;height:186px;border-radius:50%;cursor:pointer;touch-action:manipulation;position:relative;transition:transform .05s;display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative;animation:glowPulse 4s ease-in-out infinite}
.circle:active{transform:scale(.93)}
.circle svg{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%}
@keyframes glowPulse{0%,100%{box-shadow:0 0 40px rgba(160,120,80,.08)}50%{box-shadow:0 0 60px rgba(160,120,80,.12)}}
.circle .emoji{position:relative;z-index:2;font-size:36px;line-height:1;margin-top:6px;opacity:.7}
.circle .label{position:relative;z-index:2;font-size:11px;color:rgba(220,200,170,.4);letter-spacing:3px;margin-top:2px}
@keyframes shake{0%{transform:scale(.93) translate(0,0)}20%{transform:scale(.93) translate(-2px,0)}40%{transform:scale(.93) translate(2px,0)}60%{transform:scale(.93) translate(-1px,0)}80%{transform:scale(.93) translate(1px,0)}100%{transform:scale(.93) translate(0,0)}}
.circle.hit{animation:shake .1s ease-out}

/* Score */
.score-area{text-align:center;margin:2px 0 0}
.score-num{font-size:40px;font-weight:700;color:#b8a8e0;line-height:1;letter-spacing:1px}
.score-lbl{font-size:11px;color:rgba(160,140,200,.3);letter-spacing:4px;margin-bottom:2px}
.realm-badge{font-size:10px;color:rgba(160,140,200,.35);padding:2px 12px;border:1px solid rgba(160,140,200,.08);border-radius:8px;display:inline-block;letter-spacing:2px}

/* Combo */
.combo-text{text-align:center;font-size:13px;color:#e6c840;display:none;min-height:18px;margin:0}
.combo-text.show{display:block;animation:fadeUp .2s}
@keyframes fadeUp{0%{opacity:0;transform:translateY(4px)}100%{opacity:1;transform:translateY(0)}}

/* Tab bar */
.tab-bar{display:flex;gap:3px;margin:6px 0;padding:3px;background:rgba(160,140,200,.03);border-radius:8px;border:1px solid rgba(160,140,200,.03)}
.tab{flex:1;text-align:center;padding:6px 0;border-radius:5px;font-size:10px;color:rgba(160,140,200,.3);cursor:pointer;transition:all .2s;letter-spacing:.5px}
.tab.active{background:rgba(160,140,200,.07);color:#b8a8e0}

/* Panels */
.panel{display:none;animation:fadeIn .2s}
.panel.active{display:block}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}

/* Card */
.card{background:rgba(160,140,200,.02);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid rgba(160,140,200,.04)}
.card h3{font-size:12px;margin-bottom:8px;color:#b8a8e0;display:flex;align-items:center;gap:5px;letter-spacing:1px}

/* Achievements */
.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.ach-item{background:rgba(160,140,200,.02);border-radius:8px;padding:8px 4px;text-align:center;border:1px solid rgba(160,140,200,.03);opacity:.3;transition:all .2s}
.ach-item.unlocked{opacity:1;border-color:rgba(160,140,200,.1);background:rgba(160,140,200,.04)}
.ach-item .icon{font-size:20px;margin-bottom:2px}
.ach-item .name{font-size:9px;color:rgba(200,192,216,.5)}
.ach-item .desc{font-size:7px;color:rgba(160,140,200,.2);margin-top:1px}

/* Shop */
.skin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.skin-item{background:rgba(160,140,200,.02);border-radius:10px;padding:10px;text-align:center;border:1px solid rgba(160,140,200,.03)}
.skin-item .preview{width:42px;height:42px;border-radius:50%;margin:0 auto 5px;display:flex;align-items:center;justify-content:center;font-size:20px;background:radial-gradient(circle at 35% 35%,rgba(109,77,168,.3),transparent)}
.skin-item .sname{font-size:11px;color:#c8c0d8;margin-bottom:1px}
.skin-item .sdesc{font-size:8px;color:rgba(160,140,200,.2);margin-bottom:5px}
.skin-item .btn-s{width:100%;padding:5px 0;border:0;border-radius:5px;font-size:10px;cursor:pointer}
.skin-item .btn-s.eq{background:rgba(100,180,120,.12);color:#6cb87a;border:1px solid rgba(100,180,120,.15)}
.skin-item .btn-s.own{background:rgba(160,140,200,.08);color:#b8a8e0;border:1px solid rgba(160,140,200,.1)}
.skin-item .btn-s.buy{background:linear-gradient(135deg,rgba(109,77,168,.15),rgba(74,45,138,.08));color:#b8a8e0;border:1px solid rgba(160,140,200,.06)}
.skin-item .btn-s:disabled{opacity:.2;cursor:default}

/* Week */
.week-row{display:flex;gap:2px;justify-content:center;margin-bottom:8px}
.day-box{width:32px;height:32px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;background:rgba(160,140,200,.02);color:rgba(160,140,200,.15)}
.day-box.done{background:rgba(160,140,200,.1);color:#b8a8e0;border:1px solid rgba(160,140,200,.08)}
.day-box.today{background:rgba(160,140,200,.05);color:#9080b8;border:1px solid rgba(160,140,200,.12)}
.btn-c{width:100%;padding:8px;border:0;border-radius:6px;background:linear-gradient(135deg,rgba(109,77,168,.12),rgba(74,45,138,.08));color:#b8a8e0;font-size:12px;cursor:pointer;letter-spacing:1px;border:1px solid rgba(160,140,200,.06)}
.btn-c:disabled{opacity:.3;cursor:default}

/* Share */
.share-row{display:flex;gap:6px;margin-top:6px}
.btn-share{flex:1;padding:8px;border:0;border-radius:6px;font-size:11px;cursor:pointer}
.btn-share.p{background:linear-gradient(135deg,rgba(109,77,168,.12),rgba(74,45,138,.08));color:#b8a8e0;border:1px solid rgba(160,140,200,.06)}
.btn-share.s{background:rgba(160,140,200,.02);color:rgba(160,140,200,.3);border:1px solid rgba(160,140,200,.04)}

/* Stats */
.st-row{display:flex;justify-content:space-between;background:rgba(160,140,200,.02);padding:7px 10px;border-radius:6px;margin-bottom:3px}
.st-row .sl{font-size:11px;color:rgba(160,140,200,.25)}
.st-row .sv{font-size:12px;color:#a898c8}

/* Float */
.floating{position:fixed;pointer-events:none;font-size:18px;font-weight:600;color:#b8a8e0;z-index:100;animation:flUp .8s ease-out forwards}
@keyframes flUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(.3)}}

/* Toast */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,8,20,.9);color:#c8c0d8;padding:12px 22px;border-radius:8px;font-size:12px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;text-align:center;border:1px solid rgba(160,140,200,.06)}
.toast.show{opacity:1}

/* Ach popup */
.ach-pop{position:fixed;top:25%;left:50%;transform:translate(-50%,-50%) scale(.8);background:rgba(10,8,20,.92);color:#c8c0d8;padding:18px 24px;border-radius:10px;z-index:150;text-align:center;border:1px solid rgba(160,140,200,.1);opacity:0;transition:all .3s;pointer-events:none}
.ach-pop.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.ach-pop .big{font-size:30px;margin-bottom:4px}
.ach-pop .t{font-size:14px;color:#b8a8e0}
.ach-pop .d{font-size:10px;color:rgba(160,140,200,.3);margin-top:3px}

@media(max-width:360px){.circle{width:160px;height:160px}.circle .emoji{font-size:40px}.score-num{font-size:34px}}
</style>
</head>

var REALM=[{n:'初学者',m:0},{n:'入门者',m:100},{n:'坚持者',m:300},{n:'专注者',m:600},{n:'静心者',m:1200},{n:'明悟者',m:2500},{n:'沉淀者',m:5000},{n:'通达者',m:10000},{n:'澄明者',m:20000},{n:'清朗者',m:40000},{n:'圆融者',m:80000},{n:'自在者',m:150000}];
var SKIN=[{id:0,n:'原始木鱼',e:'🪵',d:'初始装饰'},{id:1,n:'紫檀木',e:'🪵',d:'檀木所制',p:200},{id:2,n:'青铜古磬',e:'🔔',d:'古铜铸成',p:500},{id:3,n:'白玉',e:'💎',d:'白玉雕琢',p:1000},{id:4,n:'鎏金宝钵',e:'🏆',d:'鎏金工艺',p:2000},{id:5,n:'分享之心',e:'💝',d:'分享可得',share:true},{id:6,n:'好友之谊',e:'🤝',d:'邀请可得',invite:true}];
var ACH=[{id:'1',n:'初次轻叩',i:'👶',d:'第一次轻叩',c:function(){return s.taps>=1}},{id:'2',n:'百次轻叩',i:'🙏',d:'100次',c:function(){return s.taps>=100}},{id:'3',n:'千次静心',i:'⚔️',d:'1000次',c:function(){return s.taps>=1000}},{id:'4',n:'万次沉淀',i:'☸️',d:'10000次',c:function(){return s.taps>=10000}},{id:'5',n:'连续五日',i:'📅',d:'连签5天',c:function(){return s.streak>=5}},{id:'6',n:'半月坚持',i:'🗓️',d:'连签15天',c:function(){return s.streak>=15}},{id:'7',n:'一月之功',i:'🌕',d:'连签30天',c:function(){return s.streak>=30}},{id:'8',n:'五连击',i:'⚡',d:'5连击',c:function(){return s.maxCombo>=5}},{id:'9',n:'二十连击',i:'🔥',d:'20连击',c:function(){return s.maxCombo>=20}},{id:'10',n:'五十连击',i:'💫',d:'50连击',c:function(){return s.maxCombo>=50}},{id:'11',n:'百连达人',i:'👑',d:'100连击',c:function(){return s.maxCombo>=100}},{id:'12',n:'收藏家',i:'🎨',d:'6件皮肤',c:function(){return s.owned.length>=6}},{id:'13',n:'分享达人',i:'📤',d:'分享10次',c:function(){return s.shareTotal>=10}},{id:'14',n:'分享大使',i:'🌟',d:'分享50次',c:function(){return s.shareTotal>=50}},{id:'15',n:'人气之星',i:'👥',d:'邀请3人',c:function(){return s.invCnt>=3}}];

/* Audio */
var actx=null;
function initAudio(){
  if(actx) return;
  try{actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume()}catch(e){}
}
function playMuyu(){
  var c=actx,t=c.currentTime;
  var ns=Math.floor(c.sampleRate*0.04),b=c.createBuffer(1,ns,c.sampleRate),d=b.getChannelData(0);
  for(var i=0;i<ns;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(ns*0.12));
  var src=c.createBufferSource();src.buffer=b;
  var bp=c.createBiquadFilter();bp.type='lowpass';bp.frequency.value=1800;bp.Q.value=0.7;
  var ng=c.createGain();ng.gain.setValueAtTime(0.35,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.04);
  src.connect(bp);bp.connect(ng);ng.connect(c.destination);src.start(t);src.stop(t+0.05);
  var modes=[{f:320,a:0.8,d:0.45},{f:470,a:0.4,d:0.38},{f:630,a:0.25,d:0.30},{f:790,a:0.15,d:0.22},{f:950,a:0.10,d:0.18},{f:1180,a:0.06,d:0.12}];
  modes.forEach(function(m){var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=m.f;g.gain.setValueAtTime(m.a*0.55,t);g.gain.exponentialRampToValueAtTime(0.001,t+m.d);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+m.d+0.05)});
  var nt=Math.floor(c.sampleRate*0.08),b2=c.createBuffer(1,nt,c.sampleRate),d2=b2.getChannelData(0);
  for(var i=0;i<nt;i++)d2[i]=(Math.random()*2-1)*Math.exp(-i/(nt*0.2));
  var src2=c.createBufferSource();src2.buffer=b2;
  var bp2=c.createBiquadFilter();bp2.type='bandpass';bp2.frequency.value=800;bp2.Q.value=2;
  var ng2=c.createGain();ng2.gain.setValueAtTime(0.12,t+0.02);ng2.gain.exponentialRampToValueAtTime(0.001,t+0.2);
  src2.connect(bp2);bp2.connect(ng2);ng2.connect(c.destination);src2.start(t+0.02);src2.stop(t+0.22);
}
function playQing(){var c=actx,t=c.currentTime;[440,660,880,1100].forEach(function(f,i){var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime((.22-i*.04)*.5,t);g.gain.exponentialRampToValueAtTime(.001,t+1.5+i*.08);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+2)})}
function playLing(){var c=actx,t=c.currentTime;[1200,1600,2000].forEach(function(f,i){var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime((.14-i*.03)*.5,t);g.gain.exponentialRampToValueAtTime(.001,t+.8+i*.1);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+1.2)})}
function playWind(){var c=actx,t=c.currentTime;for(var i=0;i<5;i++){var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=700+i*260;g.gain.setValueAtTime(.07*.7,t+i*.08);g.gain.linearRampToValueAtTime(0,t+i*.08+.3);o.connect(g);g.connect(c.destination);o.start(t+i*.08);o.stop(t+i*.08+.35)}}
function playRain(){var c=actx,t=c.currentTime;var ns=Math.floor(c.sampleRate*.5),b=c.createBuffer(1,ns,c.sampleRate),d=b.getChannelData(0);for(var i=0;i<ns;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/ns*5)*.12;var src=c.createBufferSource();src.buffer=b;var g=c.createGain();g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);src.connect(g);g.connect(c.destination);src.start(t);src.stop(t+.35)}
function playS(i){try{if(!actx)initAudio();if(actx&&actx.state==='suspended')actx.resume();if(i==0)playMuyu();else if(i==1)playQing();else if(i==2)playLing();else if(i==3)playWind();else playRain()}catch(e){}}

/* Sutra */
var si=s.sutraIdx||0,li=0;
function showSutraName(){document.getElementById('sutraName').textContent=SUT[si].n}
function nxtS(){var b=SUT[si];var ln=b.l[li];var el=document.getElementById('sutraText');el.style.opacity='0';setTimeout(function(){el.innerHTML='<span class="hl">'+ln+'</span>';el.style.opacity='1'},40);li++;if(li>=b.l.length){li=0;si=(si+1)%SUT.length;s.sutraIdx=si;sv()}}

function tap(e){
  var now=Date.now();var diff=now-s.lastTap;s.lastTap=now;
  if(diff<700){s.combo++}else{s.combo=1}
  if(s.combo>s.maxCombo)s.maxCombo=s.combo;
  var pts=1+Math.floor(Math.min(s.combo,20)/5);s.merit+=pts;s.taps++;
  try{playS(s.sndIdx)}catch(e2){}
  nxtS();
  var ci=document.getElementById('mainCircle');ci.classList.remove('hit');void ci.offsetWidth;ci.classList.add('hit');setTimeout(function(){ci.classList.remove('hit')},120);
  var ct=document.getElementById('comboText');if(s.combo>=3){ct.textContent='🔥 \u00d7'+s.combo;ct.className='combo-text show';clearTimeout(ct._t);ct._t=setTimeout(function(){ct.className='combo-text'},500)}
  var rect=ci.getBoundingClientRect();var cx=e.clientX||rect.left+rect.width/2,cy=e.clientY||rect.top+rect.height;
  var fl=document.createElement('div');fl.className='floating';fl.textContent='+'+pts;fl.style.left=cx+'px';fl.style.top=cy+'px';document.body.appendChild(fl);setTimeout(function(){fl.remove()},800);
  chkA();upd();sv();
}
function chkA(){ACH.forEach(function(a){if(!s.ach[a.id]&&a.c()){s.ach[a.id]=true;var p=document.getElementById('achPop');p.querySelector('.big').textContent=a.i;p.querySelector('.t').textContent=a.n;p.querySelector('.d').textContent=a.d;p.classList.add('show');setTimeout(function(){p.classList.remove('show')},2500)}})}
function share(){
  var url=window.location.href;
  if(!s.shareSkin){s.shareSkin=true;if(s.owned.indexOf(5)<0)s.owned.push(5);toast('\\u{1f49d} 获得「分享之心」')}
  var td=new Date().toISOString().slice(0,10);
  if(s.firstShare!==td){s.merit+=50;s.firstShare=td;toast('\\u2728 每日分享 +50')}
  s.shareToday++;s.shareTotal++;chkA();upd();sv();
  if(navigator.share)navigator.share({title:'清敲',text:'\\u{1faa6} 我在「清敲」轻叩静心，来试试放松一下～',url}).catch(function(){});
  else navigator.clipboard.writeText('\\u{1faa6} 我在「清敲」轻叩静心放松心情，你也来试试吧。 '+url).then(function(){toast('\\u2705 已复制')}).catch(function(){});
}
function invSim(){s.merit+=30;s.invCnt++;if(!s.invSkin){s.invSkin=true;if(s.owned.indexOf(6)<0)s.owned.push(6);toast('🤝 获得「好友之谊」')}chkA();upd();sv()}
function upd(){
  var td=new Date().toISOString().slice(0,10);
  document.getElementById('hScore').textContent=s.merit;document.getElementById('scoreNum').textContent=s.merit;
  var r=REALM.filter(function(x){return s.merit>=x.m}).pop()||REALM[0];
  document.getElementById('realmLabel').textContent=r.n;document.getElementById('hStreak').textContent=s.streak>0?'第'+s.streak+'天':'未签到';
  var sk=SKIN.filter(function(x){return x.id===s.skin})[0]||SKIN[0];
  var btns=document.querySelectorAll('.snd-btn');for(var i=0;i<btns.length;i++){btns[i].className=btns[i].className.replace(/\bactive\b/,'');if(parseInt(btns[i].dataset.s)===s.sndIdx)btns[i].className+=' active'}
  showSutraName();
  var rw=document.getElementById('weekRow');var nd=new Date();var wd=nd.getDay();var st=new Date(nd);st.setDate(nd.getDate()-wd);var nm=['日','一','二','三','四','五','六'];rw.innerHTML='';for(var i=0;i<7;i++){var d=new Date(st);d.setDate(st.getDate()+i);var str=d.toISOString().slice(0,10);var div=document.createElement('div');div.className='day-box';if(s.checkins.indexOf(str)>=0)div.className+=' done';else if(str===td)div.className+=' today';div.textContent=nm[i];rw.appendChild(div)}
  var ck=s.checkins.indexOf(td)>=0;var btn=document.getElementById('btnCheck');btn.textContent=ck?'已签到':'签到 · +50';btn.disabled=ck;
  document.getElementById('stToday').textContent=s.shareToday;document.getElementById('stTotal').textContent=s.shareTotal;document.getElementById('stInvite').textContent=s.invCnt;
  var ag=document.getElementById('achGrid');ag.innerHTML='';ACH.forEach(function(a){var u=!!s.ach[a.id];var d=document.createElement('div');d.className='ach-item'+(u?' unlocked':'');d.innerHTML='<div class="icon">'+a.i+'</div><div class="name">'+a.n+'</div><div class="desc">'+a.d+'</div>';ag.appendChild(d)});
  var sg=document.getElementById('skinGrid');sg.innerHTML='';SKIN.forEach(function(sk){var owned=s.owned.indexOf(sk.id)>=0,eq=s.skin===sk.id;var div=document.createElement('div');div.className='skin-item';div.innerHTML='<div class="preview" style="background:radial-gradient(circle at 35%35%,'+(sk.id===0?'rgba(109,77,168,.3)':sk.id===1?'#6B4C28':sk.id===2?'#B8860B':sk.id===3?'#E0E0FF':sk.id===4?'#DAA520':sk.id===5?'#FF69B4':'#F4A460')+',transparent)">'+sk.e+'</div><div class="sname">'+sk.n+'</div><div class="sdesc">'+(sk.d||'')+'</div>';var btn=document.createElement('button');btn.className='btn-s';if(eq){btn.textContent='已装备';btn.className='btn-s eq'}else if(owned){btn.textContent='装备';btn.className='btn-s own';btn.onclick=function(i){return function(){s.skin=i;upd();sv();upd()}}(sk.id)}else if(sk.share&&!s.shareSkin){btn.textContent='分享解锁';btn.className='btn-s buy';btn.onclick=function(){toast('分享给好友即可解锁')}}else if(sk.invite&&!s.invSkin){btn.textContent='邀请解锁';btn.className='btn-s buy';btn.onclick=function(){toast('邀请好友即可解锁')}}else if(sk.p>0){btn.textContent='✦'+sk.p;btn.className='btn-s buy';btn.onclick=function(i,p){return function(){if(s.merit>=p){s.merit-=p;s.owned.push(i);toast('获得「'+SKIN.filter(function(x){return x.id===i})[0].n+'」');sv();upd()}else toast('积分不足，还需'+(p-s.merit))}}(sk.id,sk.p)}div.appendChild(btn);sg.appendChild(div)});
  document.getElementById('sTap').textContent=s.taps;document.getElementById('sMer').textContent=s.merit;document.getElementById('sRea').textContent=r.n;document.getElementById('sStr').textContent=s.streak+'天';document.getElementById('sCom').textContent=s.maxCombo+'连';document.getElementById('sSki').textContent=s.owned.length+'/'+SKIN.length;document.getElementById('sAch').textContent=Object.keys(s.ach).length+'/'+ACH.length;
}
function toast(m,d){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},d||1500)}
var tabs=document.querySelectorAll('.tab');for(var ti=0;ti<tabs.length;ti++){(function(t){t.addEventListener('click',function(){for(var j=0;j<tabs.length;j++)tabs[j].classList.remove('active');var ps=document.querySelectorAll('.panel');for(var j=0;j<ps.length;j++)ps[j].classList.remove('active');this.classList.add('active');var p=document.getElementById(this.dataset.tab);if(p)p.classList.add('active')})})(tabs[ti])}

window.addEventListener('load',function(){
  showSutraName();nxtS();upd();s.lastVisit=new Date().toISOString();sv();
  function firstTouch(){initAudio();window.removeEventListener('touchstart',firstTouch);window.removeEventListener('click',firstTouch)}
  window.addEventListener('touchstart',firstTouch,{once:true,passive:true});
  window.addEventListener('click',firstTouch,{once:true});
  /* Sutra nav */
  document.getElementById('sutraPrev').addEventListener('click',function(){si=(si-1+SUT.length)%SUT.length;s.sutraIdx=si;li=0;sv();showSutraName();nxtS()});
  document.getElementById('sutraNext').addEventListener('click',function(){si=(si+1)%SUT.length;s.sutraIdx=si;li=0;sv();showSutraName();nxtS()});
  document.getElementById('sutraName').addEventListener('click',function(){si=(si+1)%SUT.length;s.sutraIdx=si;li=0;sv();showSutraName();nxtS()});
  /* Tap */
  var tapCircle=document.getElementById('tapCircle');var touchFired=false;
  tapCircle.addEventListener('touchstart',function(e){touchFired=true;var t=e.touches[0];var r=this.getBoundingClientRect();tap({clientX:t.clientX,clientY:t.clientY})},{passive:true});
  tapCircle.addEventListener('click',function(e){if(touchFired){touchFired=false;return}var r=this.getBoundingClientRect();tap({clientX:e.clientX||r.left+r.width/2,clientY:e.clientY||r.top+r.height})});
  var sndBtns=document.querySelectorAll('.snd-btn');for(var i=0;i<sndBtns.length;i++){(function(i,el){el.addEventListener('click',function(){s.sndIdx=parseInt(this.dataset.s);playS(s.sndIdx);upd();sv()})})(i,sndBtns[i])}
  document.getElementById('btnCheck').addEventListener('click',function(){var td=new Date().toISOString().slice(0,10);if(s.checkins.indexOf(td)>=0)return;s.checkins.push(td);s.merit+=50;var streak=0;var d=new Date();while(true){var str=d.toISOString().slice(0,10);if(s.checkins.indexOf(str)>=0){streak++;d.setDate(d.getDate()-1)}else break}s.streak=streak;if(s.streak>s.maxStreak)s.maxStreak=s.streak;sv();chkA();upd();toast('签到成功！连续'+streak+'天')});
  document.getElementById('btnShare').addEventListener('click',share);
  document.getElementById('btnCopy').addEventListener('click',function(){navigator.clipboard.writeText('\\u{1faa6} 我在「清敲」轻叩静心放松心情，你也来试试吧。 '+window.location.href).then(function(){toast('已复制')})});
  if(s.lastVisit){var hrs=(Date.now()-new Date(s.lastVisit).getTime())/3600000;if(hrs>=1){var earn=Math.floor(Math.min(hrs,48)*120);if(earn>5){s.merit+=earn;setTimeout(function(){toast('离线积累 +'+earn+' 积分')},800)}}}
  var dc=0;tapCircle.addEventListener('dblclick',function(){dc++;if(dc>=2){dc=0;invSim();toast('模拟邀请')}});
});
</script>
</body>
