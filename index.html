<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>清敲 - 敲木鱼</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:'Noto Serif SC','STSong','SimSun','Songti SC',serif;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#1a0a00,#0a0500);color:#c8b088;overflow:hidden}

/* ===== MAIN SCREEN ===== */
.screen{width:100%;max-width:420px;height:100vh;max-height:800px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative}

/* ===== TEMPLE ATMOSPHERE ===== */
/* Subtle incense smoke particles */
.smoke{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.smoke span{position:absolute;bottom:-20px;width:2px;height:20px;background:linear-gradient(to top,rgba(200,176,136,.04),rgba(200,176,136,.01),transparent);border-radius:50%;animation:smokeRise 8s infinite linear}
@keyframes smokeRise{0%{transform:translateY(0) scaleX(1);opacity:0}10%{opacity:.6}90%{opacity:.3}100%{transform:translateY(-110vh) scaleX(3);opacity:0}}
.smoke span:nth-child(1){left:20%;width:1px;animation-duration:11s;animation-delay:0s}
.smoke span:nth-child(2){left:50%;width:3px;animation-duration:9s;animation-delay:2s}
.smoke span:nth-child(3){left:75%;width:2px;animation-duration:13s;animation-delay:5s}
.smoke span:nth-child(4){left:35%;width:1.5px;animation-duration:10s;animation-delay:7s}

/* ===== TITLE AREA ===== */
.title-area{text-align:center;z-index:1;margin-bottom:8px}
.title-area h1{font-size:28px;color:#d4a574;letter-spacing:8px;font-weight:400;text-shadow:0 0 30px rgba(212,165,116,.1)}
.title-area .sub{font-size:11px;color:rgba(200,176,136,.25);letter-spacing:6px;margin-top:2px}

/* ===== SUTRA ===== */
.sutra-box{position:relative;width:100%;max-width:360px;min-height:56px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;z-index:1;
  background:rgba(30,18,8,.4);border-radius:4px;border:1px solid rgba(200,176,136,.06);padding:10px 16px}
.sutra-text{font-size:14px;color:rgba(200,176,136,.6);text-align:center;line-height:1.8;letter-spacing:1px;transition:opacity .15s;font-family:'Noto Serif SC','STSong',serif}
.sutra-text .hl{color:#c8a878}
.sutra-name{position:absolute;bottom:2px;right:8px;font-size:9px;color:rgba(200,176,136,.15)}

/* ===== WOODEN FISH ===== */
.fish-container{z-index:1;position:relative;margin-bottom:10px}

/* Outer glow ring */
.fish-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,165,116,.04) 0%,transparent 70%);pointer-events:none;animation:glowPulse 4s ease-in-out infinite}
@keyframes glowPulse{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.05)}}

/* The actual wooden fish */
.wooden-fish{position:relative;width:190px;height:190px;border-radius:50%;cursor:pointer;transition:transform .06s;
  /* Wood grain base */
  background:
    /* Scaled wood grain lines */
    repeating-linear-gradient(0deg,
      rgba(100,60,30,.03) 0px, rgba(100,60,30,.01) 1px, transparent 1px, transparent 4px),
    repeating-linear-gradient(45deg,
      rgba(100,60,30,.02) 0px, transparent 2px, transparent 5px),
    /* Main body - dark wood */
    radial-gradient(ellipse at 38% 35%, #8B6B3D 0%, #6B4C28 30%, #3D2814 60%, #1A0F08 100%);
  box-shadow:
    0 10px 60px rgba(0,0,0,.7),
    0 0 80px rgba(212,165,116,.05),
    inset 0 -15px 30px rgba(0,0,0,.5),
    inset 0 8px 20px rgba(200,160,100,.08);
  border:1px solid rgba(160,120,80,.15);
  display:flex;flex-direction:column;align-items:center;justify-content:center}
.wooden-fish:active{transform:scale(.94)}

/* Fish scale pattern overlay */
.wooden-fish::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;
  background:radial-gradient(circle at 50% 45%, transparent 25%, rgba(200,160,100,.03) 26%, transparent 27%);
  background-size:22px 22px;opacity:.4}

/* Carved line around edge */
.wooden-fish::after{content:'';position:absolute;top:5px;left:5px;right:5px;bottom:5px;border-radius:50%;
  border:1px solid rgba(200,160,100,.06)}

/* The fish design on top - a simplified fish shape */
.fish-design{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;pointer-events:none}
.fish-design svg{width:80px;height:80px;opacity:.08;filter:drop-shadow(0 0 5px rgba(200,176,136,.05))}

/* Center text */
.fish-center-text{position:relative;z-index:2;text-align:center;pointer-events:none}
.fish-char{font-size:42px;color:rgba(200,176,136,.2);letter-spacing:0;font-weight:300;font-family:'Noto Serif SC',serif;text-shadow:0 0 15px rgba(200,176,136,.05)}
.fish-label{font-size:11px;color:rgba(200,176,136,.15);letter-spacing:4px;margin-top:0}

/* Vibration effect on hit */
@keyframes vibrate{0%{transform:translate(0,0) scale(.94)}10%{transform:translate(-2px,-1px) scale(.94)}20%{transform:translate(2px,1px) scale(.94)}30%{transform:translate(-1px,2px) scale(.94)}40%{transform:translate(1px,-1px) scale(.94)}50%{transform:translate(-1px,-1px) scale(.94)}60%{transform:translate(1px,1px) scale(.94)}70%{transform:translate(2px,0) scale(.94)}80%{transform:translate(-2px,1px) scale(.94)}90%{transform:translate(1px,-1px) scale(.94)}100%{transform:translate(0,0) scale(.94)}}
.wooden-fish.hit{animation:vibrate .15s ease-out}

/* ===== MERIT ===== */
.merit-area{z-index:1;text-align:center;margin-bottom:6px}
.merit-num{font-size:40px;color:#c8a878;line-height:1;font-weight:300;letter-spacing:2px;text-shadow:0 0 20px rgba(200,176,136,.03)}
.merit-lbl{font-size:10px;color:rgba(200,176,136,.2);letter-spacing:8px;margin-top:1px}
.realm{font-size:11px;color:rgba(200,176,136,.3);letter-spacing:3px;margin-top:2px;padding:2px 12px;border:1px solid rgba(200,176,136,.06);border-radius:10px;display:inline-block}

/* ===== COMBO ===== */
.combo-text{z-index:1;font-size:15px;color:#c8a878;display:none;min-height:20px;margin-bottom:2px;letter-spacing:2px}
.combo-text.show{display:block;animation:fadeIn .2s}
@keyframes fadeIn{0%{opacity:0;transform:translateY(5px)}100%{opacity:1;transform:translateY(0)}}

/* ===== HIT PARTICLES ===== */
@keyframes partFloat{0%{opacity:1;transform:translateY(0) scale(1) rotate(0deg)}100%{opacity:0;transform:translateY(-100px) scale(0) rotate(360deg)}}
.hit-particle{position:fixed;pointer-events:none;z-index:10;font-size:18px;animation:partFloat 1s ease-out forwards}
@keyframes merFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(.3)}}
.merit-float{position:fixed;pointer-events:none;z-index:11;font-size:18px;color:#c8a878;font-family:serif;animation:merFloat .9s ease-out forwards}

/* ===== SOUND SELECT ===== */
.sound-row{z-index:1;display:flex;gap:4px;margin-bottom:8px;padding:3px;background:rgba(30,18,8,.3);border-radius:6px;border:1px solid rgba(200,176,136,.04)}
.snd-btn{padding:4px 12px;border-radius:4px;border:0;background:transparent;color:rgba(200,176,136,.2);font-size:11px;cursor:pointer;font-family:serif;transition:all .2s;letter-spacing:1px}
.snd-btn.active{background:rgba(200,176,136,.06);color:rgba(200,176,136,.5)}

/* ===== BOTTOM MENU ===== */
.menu{z-index:1;display:flex;gap:6px;margin-top:6px;padding:4px;background:rgba(30,18,8,.3);border-radius:6px;border:1px solid rgba(200,176,136,.04)}
.menu-item{flex:1;text-align:center;padding:5px 0;border-radius:4px;font-size:10px;color:rgba(200,176,136,.2);cursor:pointer;transition:all .2s;letter-spacing:1px;font-family:serif}
.menu-item.active{background:rgba(200,176,136,.06);color:rgba(200,176,136,.4)}

/* ===== PANELS ===== */
.panel-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(8,4,0,.85);z-index:50;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.panel-overlay.show{display:flex}
.panel-box{width:90%;max-width:380px;max-height:80vh;overflow-y:auto;padding:20px;background:rgba(20,12,4,.95);border:1px solid rgba(200,176,136,.08);border-radius:8px}
.panel-box::-webkit-scrollbar{width:2px}
.panel-box::-webkit-scrollbar-thumb{background:rgba(200,176,136,.1);border-radius:1px}
.panel-title{font-size:16px;color:#c8a878;letter-spacing:4px;margin-bottom:14px;text-align:center;font-weight:400}
.panel-close{position:absolute;top:12px;right:16px;font-size:18px;color:rgba(200,176,136,.2);cursor:pointer;z-index:51}

/* Panel items */
.pi{background:rgba(200,176,136,.02);border-radius:4px;padding:10px 12px;margin-bottom:6px;border:1px solid rgba(200,176,136,.03);cursor:pointer;transition:all .15s}
.pi:active{background:rgba(200,176,136,.05)}
.pi .pi-name{font-size:12px;color:rgba(200,176,136,.6);letter-spacing:1px}
.pi .pi-desc{font-size:10px;color:rgba(200,176,136,.2);margin-top:2px}
.pi .pi-status{float:right;font-size:10px;padding:2px 6px;border-radius:3px}
.pi .pi-status.owned{border:1px solid rgba(200,176,136,.1);color:rgba(200,176,136,.3)}
.pi .pi-status.equipped{background:rgba(200,176,136,.06);color:rgba(200,176,136,.4)}
.pi .pi-status.locked{color:rgba(200,176,136,.1)}
.pi .pi-status.buy{color:rgba(200,176,136,.3)}
.pi-share-btn{text-align:center;padding:10px;background:rgba(200,176,136,.04);border-radius:4px;margin-top:10px;cursor:pointer;border:1px solid rgba(200,176,136,.06);color:rgba(200,176,136,.3);font-size:12px;font-family:serif;letter-spacing:2px}
.pi-share-btn:active{background:rgba(200,176,136,.08)}

/* Stats in panel */
.st-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(200,176,136,.02)}
.st-row:last-child{border:0}
.st-row .sl{font-size:11px;color:rgba(200,176,136,.3);letter-spacing:1px}
.st-row .sv{font-size:12px;color:rgba(200,176,136,.5)}

/* Week check-in */
.wk{display:flex;gap:2px;justify-content:center;margin-bottom:10px}
.wk-d{width:32px;height:32px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;background:rgba(200,176,136,.02);color:rgba(200,176,136,.1)}
.wk-d.done{background:rgba(200,176,136,.06);color:rgba(200,176,136,.3)}
.wk-d.today{background:rgba(200,176,136,.04);color:rgba(200,176,136,.4);border:1px solid rgba(200,176,136,.1)}
.btn-ci{width:100%;padding:8px;border:0;border-radius:4px;background:rgba(200,176,136,.06);color:rgba(200,176,136,.4);font-size:12px;cursor:pointer;font-family:serif;letter-spacing:2px;border:1px solid rgba(200,176,136,.04)}
.btn-ci:disabled{opacity:.3;cursor:default}

/* Toast */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.9);background:rgba(10,6,2,.95);color:#c8a878;padding:14px 24px;border-radius:6px;font-size:13px;z-index:100;pointer-events:none;text-align:center;border:1px solid rgba(200,176,136,.08);font-family:serif;opacity:0;transition:all .25s;letter-spacing:1px}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

/* Achievement notification */
.ach-popup{position:fixed;top:20%;left:50%;transform:translate(-50%,-50%) scale(.8);background:rgba(10,6,2,.95);color:#c8a878;padding:20px 28px;border-radius:8px;z-index:90;text-align:center;border:1px solid rgba(200,176,136,.1);opacity:0;transition:all .4s;pointer-events:none}
.ach-popup.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.ach-popup .big{font-size:36px;margin-bottom:6px}
.ach-popup .t{font-size:14px;letter-spacing:2px}
.ach-popup .d{font-size:10px;color:rgba(200,176,136,.3);margin-top:4px;letter-spacing:1px}
</style>
</head>
<body>
<div class="smoke"><span></span><span></span><span></span><span></span></div>

<div class="screen">
  <div class="title-area">

  <div class="fish-container">

</div>

  {id:'11',n:'百连',i:'👑',d:'100连击',c:()=>s.maxCombo>=100},
  {id:'12',n:'法相庄严',i:'🎨',d:'6款法相',c:()=>s.owned.length>=6},
  {id:'13',n:'法布施',i:'📤',d:'分享10次',c:()=>s.shareTotal>=10},
  {id:'14',n:'大布施',i:'🌟',d:'分享50次',c:()=>s.shareTotal>=50},
  {id:'15',n:'接引',i:'👥',d:'接引3人',c:()=>s.inviteCount>=3},
]

// ============ AUDIO - High Quality Physical Model ============
let actx=null;
function getCtx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}

// REAL Wooden Fish - Physical Model
// A wooden fish is a hollow resonant cavity. When struck, it produces
// a complex set of modal resonances. These frequencies depend on size/shape/material.
// For a typical medium wooden fish:
//   Fundamental ~320-350Hz (size dependent)
//   Overtones at non-harmonic ratios (characteristic of a shaped wooden cavity)
function playMuyu(){
  const ctx=getCtx(), t=ctx.currentTime;
  
  // === Modal frequencies of a real wooden fish ===
  // These are the characteristic resonance modes:
  const modes = [
    {f:330, a:1.0, d:0.45},   // fundamental body mode
    {f:495, a:0.6, d:0.38},   // 1.5x - strong overtone
    {f:660, a:0.35, d:0.30},  // 2x
    {f:825, a:0.20, d:0.25},  // 2.5x
    {f:990, a:0.12, d:0.20},  // 3x
    {f:1155, a:0.08, d:0.16},
    {f:1320, a:0.05, d:0.12},
    {f:380, a:0.25, d:0.20},  // secondary body mode
    {f:560, a:0.15, d:0.18},  // cross-mode
  ];
  
  modes.forEach(m=>{
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.type='sine';
    osc.frequency.value=m.f;
    // Each mode has its own decay time
    gain.gain.setValueAtTime(m.a*0.6, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+m.d);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(t);
    osc.stop(t+m.d+0.05);
  });
  
  // === Strike impact noise (the "thwack" of the mallet) ===
  const bufSize=Math.floor(ctx.sampleRate*0.04);
  const buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<bufSize;i++){
    data[i]=(Math.random()*2-1)*Math.exp(-i/(bufSize*0.12));
  }
  const src=ctx.createBufferSource();
  src.buffer=buf;
  const bp=ctx.createBiquadFilter();
  bp.type='bandpass';
  bp.frequency.value=1200;
  bp.Q.value=3;
  const ng=ctx.createGain();
  ng.gain.setValueAtTime(0.35, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t+0.08);
  src.connect(bp);
  bp.connect(ng);
  ng.connect(ctx.destination);
  src.start(t);
  src.stop(t+0.1);
  
  // === Subtle reverb tail (simulated with delayed copies) ===
  [0.03, 0.06, 0.1].forEach((delay, di)=>{
    const td=t+delay;
    const osc=ctx.createOscillator();
    const g=ctx.createGain();
    osc.type='sine';
    osc.frequency.value=330+delay*800;
    g.gain.setValueAtTime(0.06-di*0.02, td);
    g.gain.exponentialRampToValueAtTime(0.001, td+0.25+di*0.1);
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start(td);
    osc.stop(td+0.4);
  });
}

function playQing(){
  const ctx=getCtx(),t=ctx.currentTime;
  [440,660,880,1100,1320].forEach((f,i)=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sine';o.frequency.value=f;
    const v=0.25-i*0.04;
    g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+2+i*0.08);
    o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+2.5);
  });
}
function playLing(){
  const ctx=getCtx(),t=ctx.currentTime;
  [1200,1600,2000,2400].forEach((f,i)=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(.15-i*.03,t);g.gain.exponentialRampToValueAtTime(.001,t+1.2+i*.1);
    o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+1.8);
  });
}
function playWind(){
  const ctx=getCtx(),t=ctx.currentTime;
  for(let i=0;i<6;i++){
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sine';o.frequency.value=700+i*250+Math.random()*30;
    g.gain.setValueAtTime(.08,t+i*.08);g.gain.linearRampToValueAtTime(0,t+i*.08+.35);
    o.connect(g);g.connect(ctx.destination);o.start(t+i*.08);o.stop(t+i*.08+.4);
  }
}
function playRain(){
  const ctx=getCtx(),t=ctx.currentTime;
  const ns=ctx.sampleRate*0.6;
  const b=ctx.createBuffer(1,ns,ctx.sampleRate);
  const d=b.getChannelData(0);
  for(let i=0;i<ns;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/ns*6)*0.15;
  const src=ctx.createBufferSource();src.buffer=b;
  const g=ctx.createGain();g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.4);
  src.connect(g);g.connect(ctx.destination);src.start(t);src.stop(t+.5);
}
function playSnd(i){
  if(i==0)playMuyu();else if(i==1)playQing();else if(i==2)playLing();else if(i==3)playWind();else playRain();
}

// ============ SUTRA ============
let si=0,li=0;
function nextS(){
  const b=SUTRA[si];const ln=b.l[li];
  const el=document.getElementById('sutraText');
  el.style.opacity='0';
  setTimeout(()=>{el.innerHTML=`<span class="hl">${ln}</span>`;el.style.opacity='1'},40);
  document.getElementById('sutraName').textContent=b.n;
  li++;if(li>=b.l.length){li=0;si=(si+1)%SUTRA.length}
}

// ============ PARTICLES ============
function spawnChars(x,y){
  const chars=['卍','☸','✦','·','~','°'];
  for(let i=0;i<3;i++){
    const el=document.createElement('div');el.className='hit-particle';
    el.textContent=chars[Math.floor(Math.random()*chars.length)];
    el.style.left=(x+Math.random()*40-20)+'px';el.style.top=(y+Math.random()*30-15)+'px';
    el.style.animationDelay=(i*0.06)+'s';
    document.body.appendChild(el);setTimeout(()=>el.remove(),1100);
  }
}

// ============ TAP ============
function tap(e){
  const now=Date.now();
  const diff=now-s.lastTap;s.lastTap=now;
  if(diff<700){s.combo++}else{s.combo=1}
  if(s.combo>s.maxCombo)s.maxCombo=s.combo;
  const bonus=Math.min(s.combo,20);
  const pts=1+Math.floor(bonus/5);
  s.merit+=pts;s.taps++;
  
  // Play sound
  playSnd(s.soundIdx);
  nextS();
  
  // Vibration animation
  const f=document.getElementById('woodenFish');
  f.classList.remove('hit');void f.offsetWidth;f.classList.add('hit');
  setTimeout(()=>f.classList.remove('hit'),150);
  
  // Combo
  const ct=document.getElementById('comboText');
  if(s.combo>=3){
    ct.textContent=s.combo>=10?`×${s.combo}`:`×${s.combo}`;
    ct.className='combo-text show';
    clearTimeout(ct._t);ct._t=setTimeout(()=>ct.className='combo-text',500);
  }
  
  // Floating merit
  const rect=f.getBoundingClientRect();
  const cx=e.clientX||rect.left+rect.width/2;
  const cy=e.clientY||rect.top+rect.height/2;
  const fl=document.createElement('div');fl.className='merit-float';
  fl.textContent=`+${pts}`;fl.style.left=cx+'px';fl.style.top=(cy-10)+'px';
  document.body.appendChild(fl);setTimeout(()=>fl.remove(),900);
  
  spawnChars(cx,cy);
  chkAch();upd();sv();
}

// ============ ACH ============
function chkAch(){
  ACH.forEach(a=>{if(!s.ach[a.id]&&a.c()){
    s.ach[a.id]=true;
    const pop=document.getElementById('achPopup');
    pop.querySelector('.big').textContent=a.i;
    pop.querySelector('.t').textContent=a.n;
    pop.querySelector('.d').textContent=a.d;
    pop.classList.add('show');
    setTimeout(()=>pop.classList.remove('show'),2500);
  }});
}

// ============ SHARE ============
function shre(){
  const url=window.location.href;
  if(!s.shareSkin){s.shareSkin=true;if(!s.owned.includes(5))s.owned.push(5);toast('💝 获得法相「分享之心」')}
  const td=new Date().toISOString().slice(0,10);
  if(s.firstShare!==td){s.merit+=50;s.firstShare=td;toast('✨ 每日首次分享 +50 功德')}
  s.shareToday++;s.shareTotal++;
  chkAch();upd();sv();
  const txt='🪷 我在「清敲」敲木鱼诵经，来感受一下静心的力量。';
  if(navigator.share){navigator.share({title:'清敲',text:txt,url}).catch(()=>{})}
  else{navigator.clipboard.writeText(txt+' '+url).then(()=>toast('✅ 已复制分享链接')).catch(()=>toast(url))}
}
function invSim(){
  s.merit+=30;s.inviteCount++;
  if(!s.inviteSkin){s.inviteSkin=true;if(!s.owned.includes(6))s.owned.push(6);toast('🤝 获得法相「友谊之莲」')}
  chkAch();upd();sv();
}

// ============ UI ============
function upd(){
  document.getElementById('meritNum').textContent=s.merit;
  const r=REALMS.filter(x=>s.merit>=x.m).pop()||REALMS[0];
  document.getElementById('realmLabel').textContent=r.n;
  
  // Skin emoji
  const sk=SKINS.find(x=>x.id===s.skin)||SKINS[0];
  document.getElementById('fishChar').textContent=sk.e;
  
  // Sound select
  document.querySelectorAll('.snd-btn').forEach(el=>el.classList.toggle('active',parseInt(el.dataset.s)===s.soundIdx));
}
function toast(msg,d=1500){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),d);
}

// ============ PANELS ============
function closePanels(){
  document.querySelectorAll('.panel-overlay').forEach(p=>p.classList.remove('show'));
}

// Achievements panel
function showAchieve(){
  closePanels();
  const c=document.getElementById('achieveContent');
  c.innerHTML='<div class="panel-title">— 修行成就 —</div>';
  ACH.forEach(a=>{
    const u=!!s.ach[a.id];
    c.innerHTML+=`<div class="pi"><div class="pi-name">${a.i} ${a.n}</div><div class="pi-desc">${a.d}</div><span class="pi-status ${u?'equipped':'locked'}">${u?'已证':'未证'}</span></div>`;
  });
  document.getElementById('panelAchieve').classList.add('show');
}

// Skins panel
function showSkins(){
  closePanels();
  const c=document.getElementById('skinsContent');
  c.innerHTML='<div class="panel-title">— 法 相 —</div>';
  SKINS.forEach(sk=>{
    const owned=s.owned.includes(sk.id),eq=s.skin===sk.id;
    let status='',action='';
    if(eq){status='equipped';action='已装备'}
    else if(owned){status='owned';action='点击装备'}
    else if(sk.share&&!s.shareSkin){status='locked';action='分享解锁'}
    else if(sk.invite&&!s.inviteSkin){status='locked';action='邀请解锁'}
    else{status='buy';action=`✦${sk.p}`}
    
    c.innerHTML+=`<div class="pi" data-id="${sk.id}" data-action="${action}">
      <div class="pi-name">${sk.e} ${sk.n}</div>
      <div class="pi-desc">${sk.d||''}</div>
      <span class="pi-status ${status}">${action}</span></div>`;
  });
  document.getElementById('panelSkins').classList.add('show');
  
  // Click handlers
  c.querySelectorAll('.pi').forEach(el=>{
    el.addEventListener('click',function(){
      const id=parseInt(this.dataset.id),act=this.dataset.action;
      if(act==='点击装备'){s.skin=id;upd();sv();showSkins();return}
      if(act==='分享解锁'){closePanels();toast('📤 分享即可解锁「分享之心」');return}
      if(act==='邀请解锁'){closePanels();toast('👥 邀请好友即可解锁「友谊之莲」');return}
      if(act.startsWith('✦')){
        const p=parseInt(act.replace('✦',''));
        if(s.merit>=p){s.merit-=p;s.owned.push(id);sv();showSkins();toast(`✅ 获得「${SKINS.find(x=>x.id===id).n}」`)}else{toast(`✦ 功德不足，还需 ${p-s.merit}`)}
      }
    });
  });
}

// Check-in panel
function showCheckin(){
  closePanels();
  const c=document.getElementById('checkinContent');
  const td=new Date(),ts=td.toISOString().slice(0,10);
  const wd=td.getDay(),st=new Date(td);st.setDate(td.getDate()-wd);
  const names=['日','一','二','三','四','五','六'];
  let wk='<div class="wk">';
  for(let i=0;i<7;i++){
    const d=new Date(st);d.setDate(st.getDate()+i);
    const str=d.toISOString().slice(0,10);
    let cls='wk-d';
    if(s.checkins.includes(str))cls+=' done';
    else if(str===ts)cls+=' today';
    wk+=`<div class="${cls}">${names[i]}</div>`;
  }
  wk+='</div>';
  const cked=s.checkins.includes(ts);
  const btnTxt=cked?'今日已签到':'📌 签到 · +50 功德';
  c.innerHTML=`<div class="panel-title">— 每日签到 —</div>${wk}<button class="btn-ci" id="ciBtn" ${cked?'disabled':''}>${btnTxt}</button>
    <div class="st-row" style="margin-top:12px"><span class="sl">连续签到</span><span class="sv">${s.streak} 天</span></div>`;
  document.getElementById('panelCheckin').classList.add('show');
  document.getElementById('ciBtn')?.addEventListener('click',()=>{
    if(s.checkins.includes(ts))return;
    s.checkins.push(ts);s.merit+=50;
    let streak=0;const d=new Date();
    while(true){const str=d.toISOString().slice(0,10);if(s.checkins.includes(str)){streak++;d.setDate(d.getDate()-1)}else break}
    s.streak=streak;if(s.streak>s.maxStreak)s.maxStreak=s.streak;
    sv();chkAch();showCheckin();toast(`📌 签到成功！连续 ${streak} 天`);
  });
}

// Share panel
function showShare(){
  closePanels();
  const c=document.getElementById('shareContent');
  c.innerHTML=`<div class="panel-title">— 法布施 —</div>
    <p style="font-size:11px;color:rgba(200,176,136,.25);text-align:center;margin-bottom:12px;letter-spacing:1px">分享清敲 · 广结善缘</p>
    <div class="st-row"><span class="sl">今日分享</span><span class="sv">${s.shareToday} 次</span></div>
    <div class="st-row"><span class="sl">累计分享</span><span class="sv">${s.shareTotal} 次</span></div>
    <div class="st-row"><span class="sl">成功接引</span><span class="sv">${s.inviteCount} 人</span></div>
    <div class="pi-share-btn" id="shareBtn">📤 分享给好友</div>
    <div class="pi-share-btn" id="copyBtn">🔗 复制链接</div>
    <div style="font-size:9px;color:rgba(200,176,136,.12);text-align:center;margin-top:10px">首次分享得「分享之心」· 每日首次 +50</div>`;
  document.getElementById('panelShare').classList.add('show');
  document.getElementById('shareBtn').onclick=shre;
  document.getElementById('copyBtn').onclick=()=>{
    navigator.clipboard.writeText('🪷 我在「清敲」敲木鱼诵经，来感受一下静心的力量。 '+window.location.href)
      .then(()=>toast('✅ 已复制')).catch(()=>toast('复制失败'));
  };
}

// Stats panel
function showStats(){
  closePanels();
  const c=document.getElementById('statsContent');
  const r=REALMS.filter(x=>s.merit>=x.m).pop()||REALMS[0];
  c.innerHTML=`<div class="panel-title">— 修行道果 —</div>
    <div class="st-row"><span class="sl">总敲击</span><span class="sv">${s.taps} 次</span></div>
    <div class="st-row"><span class="sl">总功德</span><span class="sv">${s.merit}</span></div>
    <div class="st-row"><span class="sl">当前境界</span><span class="sv">${r.n}</span></div>
    <div class="st-row"><span class="sl">连续签到</span><span class="sv">${s.streak} 天</span></div>
    <div class="st-row"><span class="sl">已得法相</span><span class="sv">${s.owned.length}/${SKINS.length}</span></div>
    <div class="st-row"><span class="sl">已证成就</span><span class="sv">${Object.keys(s.ach).length}/${ACH.length}</span></div>
    <div class="st-row"><span class="sl">最高连击</span><span class="sv">${s.maxCombo} 连</span></div>`;
  document.getElementById('panelStats').classList.add('show');
}

// ============ INIT ============
document.addEventListener('DOMContentLoaded',()=>{
  // Set initial sutra
  nextS();
  upd();
  s.lastVisit=new Date().toISOString();sv();
  
  // Tap on wooden fish
  document.getElementById('woodenFish').addEventListener('click',function(e){
    const rect=this.getBoundingClientRect();
    tap({clientX:e.clientX||rect.left+rect.width/2,clientY:e.clientY||rect.top+rect.height/2});
  });
  
  // Sound select
  document.querySelectorAll('.snd-btn').forEach(el=>{
    el.addEventListener('click',function(){
      s.soundIdx=parseInt(this.dataset.s);
      playSnd(s.soundIdx);
      upd();sv();
    });
  });
  
  // Menu items
  document.querySelectorAll('.menu-item').forEach(el=>{
    el.addEventListener('click',function(){
      const panel=this.dataset.panel;
      if(panel==='achieve')showAchieve();
      else if(panel==='skins')showSkins();
      else if(panel==='checkin')showCheckin();
      else if(panel==='share')showShare();
      else if(panel==='stats')showStats();
    });
  });
  
  // Close panels by clicking overlay
  document.querySelectorAll('.panel-overlay').forEach(p=>{
    p.addEventListener('click',function(e){if(e.target===this)this.classList.remove('show')});
  });
  
  // Offline merit
  if(s.lastVisit){
    const hrs=(Date.now()-new Date(s.lastVisit).getTime())/(3600000);
    if(hrs>=1){
      const earn=Math.floor(Math.min(hrs,48)*120);
      if(earn>5){s.merit+=earn;setTimeout(()=>toast(`🌙 离线修行 +${earn} 功德`),800)}
    }
  }
});
</script>
