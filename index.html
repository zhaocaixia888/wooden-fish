<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>敲木鱼 · 禅修</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
  body {
    background: linear-gradient(180deg, #0d0d1a 0%, #1a1025 40%, #0d1a0d 100%);
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center;
    font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
    overflow-x: hidden; position: relative;
  }

  .stars { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .star {
    position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
  }
  @keyframes twinkle { 0% { opacity: 0.15; } 100% { opacity: 0.8; } }

  .container { position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 12px 16px; display: flex; flex-direction: column; align-items: center; }

  /* ====== Header Tabs ====== */
  .tabs { display: flex; gap: 2px; width: 100%; margin-bottom: 10px; background: rgba(255,255,255,0.03); border-radius: 12px; padding: 3px; }
  .tab { flex:1; text-align: center; padding: 7px 0; border-radius: 10px; font-size: 11px; color: rgba(255,255,255,0.3); cursor: pointer; letter-spacing: 2px; transition: all 0.2s; }
  .tab.active { background: rgba(255,215,0,0.08); color: rgba(255,215,0,0.7); }
  .tab:active { background: rgba(255,255,255,0.03); }

  .page { display: none; width: 100%; flex-direction: column; align-items: center; }
  .page.active { display: flex; }

  /* ====== PAGE 1: 修行 ====== */
  .realm-section { text-align: center; margin-bottom: 4px; }
  .realm-badge { display:inline-block; padding:3px 16px; border-radius:16px; border:1px solid rgba(255,215,0,0.2); font-size:10px; letter-spacing:3px; background:rgba(255,215,0,0.03); color:rgba(255,215,0,0.6); margin-bottom:2px; }
  .realm-name { font-size:20px; font-weight:700; letter-spacing:6px; background:linear-gradient(135deg,#c9a84c,#ffd700,#c9a84c); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin:2px 0; }
  .realm-progress { width:180px; height:3px; border-radius:2px; background:rgba(255,255,255,0.05); margin:4px auto; overflow:hidden; }
  .realm-progress-bar { height:100%; border-radius:2px; background:linear-gradient(90deg,#c9a84c,#ffd700); transition:width .3s; }
  .realm-next { font-size:9px; color:rgba(255,255,255,0.2); letter-spacing:2px; }

  .counter-section { text-align:center; margin:2px 0 4px; }
  .counter-label { color:rgba(255,255,255,0.2); font-size:9px; letter-spacing:4px; }
  .counter { font-size:36px; font-weight:700; line-height:1.1; background:linear-gradient(135deg,#ffd700,#ffaa00); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; transition:transform .1s; }

  .fish-wrapper { position:relative; width:165px; height:165px; margin:2px 0; cursor:pointer; }
  .fish-wrapper:active .fish { transform:scale(0.93); }
  .fish { width:100%; height:100%; position:relative; z-index:2; transition:transform .06s; will-change:transform; }
  .fish svg { width:100%; height:100%; display:block; filter:drop-shadow(0 4px 20px rgba(255,215,0,0.06)); }
  .tap-glow { position:absolute; inset:-20px; z-index:1; pointer-events:none; border-radius:50%; background:radial-gradient(circle,rgba(255,215,0,0.06) 0%,transparent 70%); opacity:0; transition:opacity .3s; }
  .tap-glow.active { opacity:1; transition:opacity 0s; }
  .ripple-el { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:10px; height:10px; border-radius:50%; z-index:3; pointer-events:none; animation:rippleAnim .7s ease-out forwards; }
  @keyframes rippleAnim { to { width:180px; height:180px; opacity:0; } }
  .float-merit { position:fixed; pointer-events:none; z-index:10; font-size:20px; font-weight:700; color:#ffd700; text-shadow:0 0 8px rgba(255,215,0,0.3); animation:floatUp 1s ease-out forwards; }
  @keyframes floatUp { 0%{opacity:1;transform:translateY(0)scale(0.5)}50%{opacity:1;transform:translateY(-40px)scale(1.1)}100%{opacity:0;transform:translateY(-80px)scale(0.7)} }

  .sound-row { display:flex; gap:5px; margin:4px 0; }
  .sound-btn { width:44px; height:44px; border-radius:50%; border:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.02); display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition:all .2s; gap:1px; font-size:16px; }
  .sound-btn .label { font-size:6px; color:rgba(255,255,255,0.25); letter-spacing:1px; }
  .sound-btn.active { border-color:rgba(255,215,0,0.25); background:rgba(255,215,0,0.05); }
  .sound-btn.active .label { color:rgba(255,215,0,0.4); }

  /* Sutra */
  .sutra-area { width:100%; min-height:60px; margin:4px 0; background:rgba(255,255,255,0.015); border-radius:10px; border:1px solid rgba(255,215,0,0.04); padding:10px 14px; }
  .sutra-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .sutra-title { font-size:10px; color:rgba(255,215,0,0.35); letter-spacing:2px; }
  .sutra-toggle { font-size:9px; color:rgba(255,255,255,0.2); cursor:pointer; padding:2px 8px; border-radius:8px; border:1px solid rgba(255,255,255,0.06); background:transparent; }
  .sutra-selector { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:6px; }
  .sutra-opt { font-size:9px; padding:2px 8px; border-radius:8px; border:1px solid rgba(255,255,255,0.06); color:rgba(255,255,255,0.25); cursor:pointer; background:transparent; }
  .sutra-opt.active { border-color:rgba(255,215,0,0.25); color:rgba(255,215,0,0.5); background:rgba(255,215,0,0.04); }
  .sutra-text { font-size:14px; line-height:1.8; color:rgba(255,255,255,0.45); text-align:justify; letter-spacing:1px; max-height:150px; overflow-y:auto; scroll-behavior:smooth; }
  .sutra-text .char { transition:color .15s; }
  .sutra-text .char.read { color:rgba(255,215,0,0.6); }
  .sutra-text .char.current { color:#ffd700; text-shadow:0 0 6px rgba(255,215,0,0.25); }
  .sutra-bar { height:2px; background:rgba(255,255,255,0.03); border-radius:1px; margin-top:4px; overflow:hidden; }
  .sutra-bar-inner { height:100%; background:rgba(255,215,0,0.15); border-radius:1px; transition:width .2s; }

  .stats { display:flex; gap:16px; margin:3px 0; color:rgba(255,255,255,0.12); font-size:9px; }

  /* ====== PAGE 2: 签到 ====== */
  .checkin-section { width:100%; text-align:center; }
  .checkin-title { font-size:14px; color:rgba(255,215,0,0.5); letter-spacing:4px; margin-bottom:2px; }
  .checkin-sub { font-size:10px; color:rgba(255,255,255,0.2); margin-bottom:10px; }
  .checkin-btn {
    display:inline-block; padding:12px 48px; border-radius:24px; font-size:15px; letter-spacing:4px;
    border:none; cursor:pointer; font-family:inherit; margin-bottom:8px; transition:all .2s;
    background:linear-gradient(135deg,#c9a84c,#ffd700); color:#1a1a2e; font-weight:700;
    box-shadow:0 4px 20px rgba(255,215,0,0.15);
  }
  .checkin-btn:active { transform:scale(0.95); }
  .checkin-btn.done { background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.2); box-shadow:none; pointer-events:none; }

  .streak-row { display:flex; gap:4px; justify-content:center; margin:6px 0; flex-wrap:wrap; }
  .streak-day {
    width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:9px; border:1px solid rgba(255,255,255,0.06); color:rgba(255,255,255,0.15); background:rgba(255,255,255,0.02);
  }
  .streak-day.checked { border-color:rgba(255,215,0,0.3); background:rgba(255,215,0,0.08); color:#ffd700; }
  .streak-day.today { border-color:rgba(255,215,0,0.5); box-shadow:0 0 8px rgba(255,215,0,0.1); }
  .streak-info { font-size:10px; color:rgba(255,255,255,0.2); letter-spacing:2px; margin:4px 0; }

  .offline-section { width:100%; margin-top:10px; background:rgba(255,255,255,0.015); border-radius:10px; border:1px solid rgba(255,215,0,0.04); padding:12px; text-align:center; }
  .offline-title { font-size:11px; color:rgba(255,215,0,0.35); letter-spacing:2px; margin-bottom:4px; }
  .offline-amount { font-size:28px; font-weight:700; color:rgba(255,215,0,0.6); }
  .offline-claim {
    margin-top:6px; padding:8px 36px; border-radius:18px; font-size:13px; letter-spacing:2px;
    border:none; cursor:pointer; font-family:inherit; transition:all .2s;
    background:linear-gradient(135deg,#c9a84c,#ffd700); color:#1a1a2e; font-weight:600;
  }
  .offline-claim:active { transform:scale(0.95); }
  .offline-claim.hidden { display:none; }

  /* ====== PAGE 3: 成就 ====== */
  .achieve-section { width:100%; }
  .achieve-title { text-align:center; font-size:14px; color:rgba(255,215,0,0.5); letter-spacing:4px; margin-bottom:8px; }
  .achieve-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .achieve-card {
    padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.04); background:rgba(255,255,255,0.01);
    text-align:center; transition:all .2s;
  }
  .achieve-card.unlocked { border-color:rgba(255,215,0,0.15); background:rgba(255,215,0,0.03); }
  .achieve-card .icon { font-size:24px; margin-bottom:4px; }
  .achieve-card .name { font-size:11px; font-weight:600; color:rgba(255,255,255,0.5); margin-bottom:2px; }
  .achieve-card.unlocked .name { color:rgba(255,215,0,0.7); }
  .achieve-card .desc { font-size:8px; color:rgba(255,255,255,0.15); }
  .achieve-card.locked { opacity:0.4; }
  .achieve-card.locked .icon { filter:grayscale(1); }

  /* Modal */
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:50; display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
  .modal-bg.show { display:flex; }
  .modal { background:linear-gradient(180deg,#1a1a2e,#0d0d1a); border:1px solid rgba(255,215,0,0.1); border-radius:16px; padding:20px; width:300px; max-width:90vw; text-align:center; }
  .modal h2 { color:#ffd700; font-size:16px; letter-spacing:2px; margin-bottom:8px; }
  .modal p { color:rgba(255,255,255,0.4); font-size:11px; line-height:1.6; margin-bottom:12px; }
  .modal-btn { padding:8px 28px; border-radius:16px; border:none; background:rgba(255,215,0,0.1); color:#ffd700; font-size:12px; cursor:pointer; letter-spacing:2px; }

  /* Realm msg */
  .realm-msg { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:20; pointer-events:none; text-align:center; animation:realmPop 2.5s ease-out forwards; }
  .realm-msg .title { font-size:32px; font-weight:900; letter-spacing:8px; }
  .realm-msg .sub { font-size:13px; margin-top:4px; letter-spacing:4px; opacity:0.8; }
  .realm-msg .bonus { font-size:11px; margin-top:6px; letter-spacing:2px; opacity:0.5; }
  @keyframes realmPop { 0%{opacity:0;transform:translate(-50%,-50%)scale(0.3)}20%{opacity:1;transform:translate(-50%,-50%)scale(1.2)}40%{transform:translate(-50%,-50%)scale(1)}100%{opacity:0;transform:translate(-50%,-60%)scale(0.95)} }

  .footer { margin-top:8px; font-size:9px; color:rgba(255,255,255,0.06); letter-spacing:2px; }

  /* New achievement unlock toast */
  .achieve-toast {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:25; pointer-events:none; text-align:center;
    animation:achievePop 2.5s ease-out forwards;
  }
  .achieve-toast .icon { font-size:48px; }
  .achieve-toast .label { font-size:14px; color:#ffd700; letter-spacing:4px; margin-top:4px; }
  .achieve-toast .sub { font-size:10px; color:rgba(255,215,0,0.5); letter-spacing:2px; margin-top:2px; }
  @keyframes achievePop { 0%{opacity:0;transform:translate(-50%,-50%)scale(0.3)}15%{opacity:1;transform:translate(-50%,-50%)scale(1.15)}30%{transform:translate(-50%,-50%)scale(1)}100%{opacity:0;transform:translate(-50%,-60%)scale(0.95)} }

  @media(max-width:380px){ .fish-wrapper{width:145px;height:145px} .counter{font-size:30px} .realm-name{font-size:18px} }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-page="cultivate">🧘 修行</div>
    <div class="tab" data-page="checkin">📿 签到</div>
    <div class="tab" data-page="achieve">🏆 成就</div>
  </div>

  <!-- ====== PAGE 1: CULTIVATE ====== -->
  <div class="page active" id="pageCultivate">
    <div class="realm-section">
      <div class="realm-badge">修 行 境 界</div>
      <div class="realm-name" id="realmName">凡 人</div>
      <div class="realm-progress"><div class="realm-progress-bar" id="realmBar" style="width:0%"></div></div>
      <div class="realm-next" id="realmNext">下一境：练气期 · 100 功德</div>
    </div>
    <div class="counter-section">
      <div class="counter-label">累 积 功 德</div>
      <div class="counter" id="counter">0</div>
    </div>
    <div class="fish-wrapper" id="fishWrapper">
      <div class="tap-glow" id="tapGlow"></div>
      <div class="fish" id="fish">
        <svg viewBox="0 0 240 240">
          <ellipse cx="120" cy="130" rx="72" ry="58" fill="#8B7355" stroke="#6B5B3E" stroke-width="2"/>
          <ellipse cx="120" cy="130" rx="66" ry="52" fill="#9B8365"/>
          <ellipse cx="108" cy="112" rx="36" ry="24" fill="#B09878" opacity="0.5"/>
          <circle cx="155" cy="112" r="12" fill="#fff"/>
          <circle cx="155" cy="112" r="7" fill="#2c1810"/>
          <circle cx="158" cy="109" r="3" fill="#fff" opacity="0.8"/>
          <path d="M70 128 Q85 114 100 128" fill="none" stroke="#7B6345" stroke-width="0.6" opacity="0.4"/>
          <path d="M85 138 Q100 124 115 138" fill="none" stroke="#7B6345" stroke-width="0.6" opacity="0.4"/>
        </svg>
      </div>

    <div class="sound-row" id="soundRow"></div>

    <div class="stats">

      <span>📅 <span id="streakDisp">0天</span></span>
      <span>📖 <span id="sutraPct">0%</span></span>
    </div>
  </div>

  <!-- ====== PAGE 2: CHECKIN ====== -->
  <div class="page" id="pageCheckin">
    <div class="checkin-section">
      <div class="checkin-title">📿 每 日 修 行</div>
      <div class="checkin-sub" id="checkinSub">今日尚未签到</div>
      <button class="checkin-btn" id="checkinBtn">今日签到</button>
      <div class="streak-row" id="streakRow"></div>
      <div class="streak-info" id="streakInfo">连续签到 0 天</div>
    </div>
    <div class="offline-section" id="offlineSection">
      <div class="offline-title">🌙 离 线 功 德</div>
      <div class="offline-amount" id="offlineAmount">+0</div>
      <button class="offline-claim hidden" id="offlineClaim">领取离线功德</button>
    </div>
  </div>

  <!-- ====== PAGE 3: ACHIEVEMENTS ====== -->
  <div class="page" id="pageAchieve">
    <div class="achieve-section">
      <div class="achieve-title">🏆 修 行 成 就</div>
      <div class="achieve-grid" id="achieveGrid"></div>
    </div>
  </div>

  <div class="footer">一 切 有 为 法 · 如 梦 幻 泡 影</div>
</div>

<!-- Realm modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">🎉</h2>
    <p id="modalDesc"></p>
    <button class="modal-btn" onclick="document.getElementById('modalBg').classList.remove('show')">善哉</button>
  </div>
</div>

<script>
// ====== DATA ======
const SUTRAS = {
  heart:{name:'般若波罗蜜多心经',text:'观自在菩萨，行深般若波罗蜜多时，照见五蕴皆空，度一切苦厄。舍利子，色不异空，空不异色，色即是空，空即是色，受想行识，亦复如是。舍利子，是诸法空相，不生不灭，不垢不净，不增不减。是故空中无色，无受想行识，无眼耳鼻舌身意，无色声香味触法，无眼界，乃至无意识界。无无明，亦无无明尽，乃至无老死，亦无老死尽。无苦集灭道，无智亦无得。以无所得故，菩提萨埵，依般若波罗蜜多故，心无挂碍；无挂碍故，无有恐怖，远离颠倒梦想，究竟涅槃。三世诸佛，依般若波罗蜜多故，得阿耨多罗三藐三菩提。故知般若波罗蜜多，是大神咒，是大明咒，是无上咒，是无等等咒，能除一切苦，真实不虚。故说般若波罗蜜多咒，即说咒曰：揭谛揭谛，波罗揭谛，波罗僧揭谛，菩提萨婆诃。'},
  diamond:{name:'金刚经（节选）',text:'如是我闻。一时，佛在舍卫国祇树给孤独园，与大比丘众千二百五十人俱。尔时，世尊食时，著衣持钵，入舍卫大城乞食。于其城中，次第乞已，还至本处。饭食讫，收衣钵，洗足已，敷座而坐。时，长老须菩提在大众中即从座起，偏袒右肩，右膝着地，合掌恭敬而白佛言：希有！世尊！如来善护念诸菩萨，善付嘱诸菩萨。世尊！善男子、善女人，发阿耨多罗三藐三菩提心，应云何住？云何降伏其心？佛言：善哉，善哉！须菩提！如汝所说，如来善护念诸菩萨，善付嘱诸菩萨。汝今谛听，当为汝说。善男子、善女人，发阿耨多罗三藐三菩提心，应如是住，如是降伏其心。唯然，世尊！愿乐欲闻。佛告须菩提：诸菩萨摩诃萨应如是降伏其心。所有一切众生之类，若卵生、若胎生、若湿生、若化生，若有色、若无色，若有想、若无想，若非有想非无想，我皆令入无余涅槃而灭度之。如是灭度无量无数无边众生，实无众生得灭度者。何以故？须菩提！若菩萨有我相、人相、众生相、寿者相，即非菩萨。'},
  om:{name:'六字大明咒',text:'嗡 嘛 呢 叭 咪 吽 嗡 嘛 呢 叭 咪 吽 嗡 嘛 呢 叭 咪 吽 嗡 嘛 呢 叭 咪 吽 嗡 嘛 呢 叭 咪 吽 嗡 嘛 呢 叭 咪 吽 嗡 嘛 呢 叭 咪 吽 嗡 嘛 呢 叭 咪 吽 嗡 嘛 呢 叭 咪 吽 嗡 嘛 呢 叭 咪 吽 嗡 嘛 呢 叭 咪 吽 嗡 嘛 呢 叭 咪 吽 嗡 嘛 呢 叭 咪 吽 嗡 嘛 呢 叭 咪 吽 嗡 嘛 呢 叭 咪 吽 嗡 嘛 呢 叭 咪 吽'},
};
const REALMS = [
  {name:'凡人',need:0,color:'#888',desc:'凡尘俗世，尚未入道'},
  {name:'练气期',need:100,color:'#4a90d9',desc:'初窥门径，气感初生'},
  {name:'筑基期',need:1000,color:'#5b9fe0',desc:'根基已固，道心初成'},
  {name:'金丹期',need:10000,color:'#ffd700',desc:'金丹大成，脱胎换骨'},
  {name:'元婴期',need:50000,color:'#ff6b6b',desc:'元婴出窍，神游太虚'},
  {name:'化神期',need:200000,color:'#9b59b6',desc:'化神合道，天地共鸣'},
  {name:'合体期',need:500000,color:'#e056a0',desc:'天人合一，万法归宗'},
  {name:'渡劫期',need:1000000,color:'#ff4444',desc:'天劫将至，九死一生'},
  {name:'大乘期',need:5000000,color:'#00d4ff',desc:'功参造化，超凡入圣'},
  {name:'飞升境',need:10000000,color:'#fff',desc:'功德圆满，飞升仙界'},
];
const ACHIEVEMENTS = [
  {id:'first',icon:'🥇',name:'初入佛门',desc:'敲满 100 次',check:s=>s.total>=100},
  {id:'thousand',icon:'⚡',name:'日诵千遍',desc:'单日敲 1000 次',check:s=>s.dayTotal>=1000},
  {id:'sutra10',icon:'📖',name:'心经圆满',desc:'读完心经 10 遍',check:s=>s.sutraCounts?.heart>=10},
  {id:'realm3',icon:'🔥',name:'筑基成功',desc:'达到筑基期',check:s=>{const r=getRealm(s.merit);return REALMS.indexOf(r)>=2}},
  {id:'realm5',icon:'💎',name:'元婴出窍',desc:'达到元婴期',check:s=>{const r=getRealm(s.merit);return REALMS.indexOf(r)>=4}},
  {id:'realm7',icon:'🌟',name:'天人合一',desc:'达到合体期',check:s=>{const r=getRealm(s.merit);return REALMS.indexOf(r)>=6}},
  {id:'streak3',icon:'🔥',name:'修行精进',desc:'连续签到 3 天',check:s=>s.streak>=3},
  {id:'streak7',icon:'🌈',name:'七日不断',desc:'连续签到 7 天',check:s=>s.streak>=7},
  {id:'streak30',icon:'👑',name:'大德精进',desc:'连续签到 30 天',check:s=>s.streak>=30},
  {id:'offline',icon:'🌙',name:'禅定自修',desc:'领取首次离线功德',check:s=>s.offlineClaimed>0},
  {id:'million',icon:'🏆',name:'功德无量',desc:'累积功德突破百万',check:s=>s.merit>=1000000},
];

// ====== SOUNDS ======
const SOUNDS = [
  {id:'muyu',emoji:'🪵',label:'木鱼',play:(c,t)=>{const o=c.createOscillator(),g=c.createGain();o.type='triangle';o.frequency.setValueAtTime(420,t);g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.18);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+0.18);const o2=c.createOscillator(),g2=c.createGain();o2.type='sine';o2.frequency.setValueAtTime(210,t);g2.gain.setValueAtTime(0.12,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.25);o2.connect(g2);g2.connect(c.destination);o2.start(t);o2.stop(t+0.25);}},
  {id:'bell',emoji:'🔔',label:'磬声',play:(c,t)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(880,t);g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+2.5);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+2.5);const d=c.createDelay(0.5),dg=c.createGain();d.delayTime.setValueAtTime(0.4,t);dg.gain.setValueAtTime(0.06,t);dg.gain.exponentialRampToValueAtTime(0.001,t+2.5);o.connect(d);d.connect(dg);dg.connect(c.destination);}},
  {id:'bowl',emoji:'🥣',label:'颂钵',play:(c,t)=>{[528,660,792].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(f,t+i*0.03);g.gain.setValueAtTime(0.05,t+i*0.03);g.gain.exponentialRampToValueAtTime(0.001,t+3);o.connect(g);g.connect(c.destination);o.start(t+i*0.03);o.stop(t+3);});}},
  {id:'water',emoji:'💧',label:'水滴',play:(c,t)=>{const bf=c.createBiquadFilter();bf.type='bandpass';bf.frequency.setValueAtTime(2000,t);bf.Q.setValueAtTime(5,t);const g=c.createGain();g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.35);const buf=c.createBuffer(1,c.sampleRate*0.04,c.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*0.01));const src=c.createBufferSource();src.buffer=buf;src.connect(bf);bf.connect(g);g.connect(c.destination);src.start(t);}},
  {id:'wind',emoji:'🎐',label:'风铃',play:(c,t)=>{[1200,1500,1800,2100].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(f,t+i*0.02);g.gain.setValueAtTime(0.03,t+i*0.02);g.gain.exponentialRampToValueAtTime(0.001,t+2);o.connect(g);g.connect(c.destination);o.start(t+i*0.02);o.stop(t+2);});}},
];

// ====== STATE ======
const LS=k=>{try{return localStorage.getItem('mf_'+k)}catch{return null}};
const LSS=(k,v)=>{try{localStorage.setItem('mf_'+k,v)}catch{}};

const today=()=>{const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0')};

let st = {
  merit: parseInt(LS('merit')||'0'),
  total: parseInt(LS('total')||'0'),
  dayTotal: parseInt(LS('dayTotal')||'0'),
  dayDate: LS('dayDate')||'',
  combo:0,
  soundIdx:parseInt(LS('sound')||'0'),
  sutraOn:LS('sutraOn')==='1',
  sutraIdx:LS('sutraKey')||'heart',
  sutraPos:parseInt(LS('sutraPos')||'0'),
  sutraCounts: JSON.parse(LS('sutraCounts')||'{}'),
  checkinDate: LS('checkinDate')||'',
  streak: parseInt(LS('streak')||'0'),
  checkinHistory: JSON.parse(LS('checkinHistory')||'[]'),
  offlineAccum: parseInt(LS('offlineAccum')||'0'),
  offlineClaimed: parseInt(LS('offlineClaimed')||'0'),
  achievements: JSON.parse(LS('achievements')||'[]'),
  lastTapTime: parseInt(LS('lastTapTime')||'0'),
};
let sessionCount=0;
let lastTap=0,ac,dayTotalAtSessionStart=st.dayTotal,dayDateAtSessionStart=st.dayDate;

function getRealm(m){let r=REALMS[0];for(const x of REALMS){if(m>=x.need)r=x}return r}
function getNext(m){for(const x of REALMS){if(m<x.need)return x}return null}

// ====== RESET DAY ======
function checkDayReset(){
  const td=today();
  if(st.dayDate!==td){
    st.dayTotal=0; st.dayDate=td; LSS('dayDate',td); LSS('dayTotal',0);
  }
}

// ====== OFFLINE ======
function calcOffline(){
  const now=Date.now();
  const elapsed=now-st.lastTapTime;
  if(elapsed<60000||st.lastTapTime===0) return 0; // <1min no accumulation
  // 1 merit per 30 seconds offline, cap at 1000
  const earned=Math.min(Math.floor(elapsed/30000),1000);
  return earned;
}

function claimOffline(){
  const amt=st.offlineAccum;
  if(amt<=0) return;
  st.merit+=amt; st.total+=amt;
  st.offlineClaimed+=1;
  st.offlineAccum=0;
  LSS('merit',st.merit); LSS('total',st.total);
  LSS('offlineAccum',0); LSS('offlineClaimed',st.offlineClaimed);
  showModal('🌙 禅定归来',`离线期间自动修行，获得 ${amt} 功德\n心如止水，功不唐捐`);
  checkAchievements();
  refreshAll();
}

// ====== CHECKIN ======
function checkin(){
  if(st.checkinDate===today()) return;
  // Check continuity
  const yesterday=new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yStr=yesterday.getFullYear()+'-'+(yesterday.getMonth()+1).toString().padStart(2,'0')+'-'+yesterday.getDate().toString().padStart(2,'0');
  if(st.checkinDate===yStr||st.checkinDate===''){
    st.streak+=1;
  } else {
    st.streak=1;
  }
  st.checkinDate=today();
  st.checkinHistory.push(today());
  if(st.checkinHistory.length>60) st.checkinHistory=st.checkinHistory.slice(-60);
  LSS('checkinDate',st.checkinDate);
  LSS('streak',st.streak);
  LSS('checkinHistory',JSON.stringify(st.checkinHistory));

  // Reward
  const bonus=Math.min(100+st.streak*20,500);
  st.merit+=bonus; st.total+=bonus;
  LSS('merit',st.merit); LSS('total',st.total);

  // Realm check
  const prev=getRealm(st.merit-bonus);
  const now=getRealm(st.merit);
  if(prev.name!==now.name) showRealmMsg(now,`签到奖励 +${bonus} 功德`);

  showModal('📿 签到成功',`修行第 ${st.streak} 天\n获得 ${bonus} 功德\n${st.streak>=7?'🔥 连续七日，道心稳固！':''}${st.streak>=30?'👑 三十日不断，大德之相！':''}`);
  checkAchievements();
  refreshAll();
}

// ====== ACHIEVEMENTS ======
function checkAchievements(){
  const ctx={...st,dayTotal:st.dayTotal};
  let unlocked=false;
  for(const a of ACHIEVEMENTS){
    if(!st.achievements.includes(a.id) && a.check(ctx)){
      st.achievements.push(a.id);
      LSS('achievements',JSON.stringify(st.achievements));
      showAchieveToast(a);
      unlocked=true;
    }
  }
  if(unlocked) refreshAchievements();
}

function showAchieveToast(a){
  const el=document.createElement('div');
  el.className='achieve-toast';
  el.innerHTML=`<div class="icon">${a.icon}</div><div class="label">🏆 成就解锁</div><div class="sub">${a.name} · ${a.desc}</div>`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2500);
}

// ====== SOUND ======
function playSound(){
  try{
    if(!ac) ac=new(window.AudioContext||window.webkitAudioContext)();
    if(ac.state==='suspended') ac.resume();
    SOUNDS[st.soundIdx].play(ac,ac.currentTime);
  }catch(e){}
}

// ====== TAP ======
function tap(){
  const now=Date.now();
  if(now-lastTap<70) return;
  lastTap=now;
  st.lastTapTime=now; LSS('lastTapTime',now);

  checkDayReset();
  st.merit+=1; st.total+=1; st.dayTotal+=1; sessionCount+=1;
  LSS('merit',st.merit); LSS('total',st.total); LSS('dayTotal',st.dayTotal);

  playSound();
  advanceSutra();

  const prev=getRealm(st.merit-1);
  const cur=getRealm(st.merit);
  if(prev.name!==cur.name) showRealmMsg(cur,'');

  document.getElementById('counter').style.transform='scale(1.08)';
  setTimeout(()=>document.getElementById('counter').style.transform='',100);

  const glow=document.getElementById('tapGlow');
  glow.classList.remove('active'); void glow.offsetWidth;
  glow.classList.add('active'); setTimeout(()=>glow.classList.remove('active'),100);

  const r=document.getElementById('fishWrapper').getBoundingClientRect();
  const f=document.createElement('div'); f.className='float-merit'; f.textContent='+1';
  f.style.left=(r.left+r.width/2-10+(Math.random()-0.5)*30)+'px'; f.style.top=(r.top-10)+'px';
  document.body.appendChild(f); setTimeout(()=>f.remove(),1000);

  const ri=document.createElement('div'); ri.className='ripple-el';
  document.getElementById('fishWrapper').appendChild(ri); setTimeout(()=>ri.remove(),700);

  refreshAll();
}

function showRealmMsg(realm,bonus){
  const el=document.createElement('div'); el.className='realm-msg';
  el.innerHTML=`<div class="title" style="color:${realm.color}">${realm.name}</div><div class="sub" style="color:${realm.color}">${realm.desc}</div>${bonus?`<div class="bonus" style="color:${realm.color}">${bonus}</div>`:''}`;
  document.body.appendChild(el); setTimeout(()=>el.remove(),2500);
}

function showModal(title,desc){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalDesc').textContent=desc;
  document.getElementById('modalBg').classList.add('show');
}

// ====== SUTRA ======
function renderSutra(){
  const s=SUTRAS[st.sutraIdx]; if(!s) return;
  document.getElementById('sutraTitle').textContent='📖 '+s.name;
  const chars=s.text.split('');
  let h='';
  chars.forEach((c,i)=>{
    const cls=i<st.sutraPos?'char read':(i===st.sutraPos?'char current':'char');
    h+=`<span class="${cls}">${c===' '?'&nbsp;':c}</span>`;
  });
  document.getElementById('sutraText').innerHTML=h;
  const p=chars.length>0?st.sutraPos/chars.length*100:0;
  document.getElementById('sutraBar').style.width=p+'%';
  document.getElementById('sutraPct').textContent=Math.round(p)+'%';
  const el=document.getElementById('sutraText').querySelector('.current');
  if(el) el.scrollIntoView({block:'nearest',behavior:'smooth'});
}
function advanceSutra(){
  if(!st.sutraOn) return;
  const s=SUTRAS[st.sutraIdx]; if(!s) return;
  st.sutraPos++;
  if(st.sutraPos>=s.text.length){
    st.sutraPos=0;
    st.sutraCounts[st.sutraIdx]=(st.sutraCounts[st.sutraIdx]||0)+1;
    LSS('sutraCounts',JSON.stringify(st.sutraCounts));
    checkAchievements();
  }
  LSS('sutraPos',st.sutraPos);
  renderSutra();
}

// ====== UI ======
function refreshAll(){
  const realm=getRealm(st.merit); const next=getNext(st.merit);
  document.getElementById('realmName').textContent=realm.name;
  document.getElementById('realmName').style.background=`linear-gradient(135deg,${realm.color},#ffd700,${realm.color})`;
  document.getElementById('realmName').style.webkitBackgroundClip='text';
  document.getElementById('counter').textContent=st.merit.toLocaleString();
  document.getElementById('totalDisp').textContent=st.total.toLocaleString();
  document.getElementById('streakDisp').textContent=st.streak+'天';
  if(next){const p=Math.min((st.merit-realm.need)/(next.need-realm.need)*100,100);document.getElementById('realmBar').style.width=p+'%';document.getElementById('realmNext').textContent=`下一境：${next.name} · ${next.need.toLocaleString()} 功德`}
  else{document.getElementById('realmBar').style.width='100%';document.getElementById('realmNext').textContent='已达至高境界'}

  // Sound buttons
  const row=document.getElementById('soundRow'); row.innerHTML='';
  SOUNDS.forEach((s,i)=>{
    const b=document.createElement('button');
    b.className='sound-btn'+(i===st.soundIdx?' active':'');
    b.innerHTML=`<span>${s.emoji}</span><span class="label">${s.label}</span>`;
    b.onclick=()=>{st.soundIdx=i;LSS('sound',i);refreshAll();playSound()};
    row.appendChild(b);
  });

  LSS('merit',st.merit); LSS('total',st.total);

  // Checkin page
  const cd=document.getElementById('checkinSub');
  const cb=document.getElementById('checkinBtn');
  if(st.checkinDate===today()){
    cd.textContent='✅ 今日已签到';
    cb.className='checkin-btn done'; cb.textContent='已签到';
  } else {
    cd.textContent='🌅 今日尚未签到';
    cb.className='checkin-btn'; cb.textContent='今日签到';
  }
  document.getElementById('streakInfo').textContent=`连续签到 ${st.streak} 天`;

  // Streak row
  const sr=document.getElementById('streakRow'); sr.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(); d.setDate(d.getDate()-6+i);
    const ds=d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');
    const el=document.createElement('div'); el.className='streak-day';
    if(st.checkinHistory.includes(ds)) el.classList.add('checked');
    if(ds===today()) el.classList.add('today');
    const weekdays=['日','一','二','三','四','五','六'];
    el.textContent=weekdays[d.getDay()];
    sr.appendChild(el);
  }

  // Offline
  st.offlineAccum=calcOffline();
  const oa=document.getElementById('offlineAmount');
  oa.textContent='+'+st.offlineAccum;
  const oc=document.getElementById('offlineClaim');
  if(st.offlineAccum>0){ oc.className='offline-claim'; oc.onclick=claimOffline; }
  else oc.className='offline-claim hidden';

  // Achievements
  refreshAchievements();
}

function refreshAchievements(){
  const g=document.getElementById('achieveGrid'); g.innerHTML='';
  for(const a of ACHIEVEMENTS){
    const unlocked=st.achievements.includes(a.id);
    const el=document.createElement('div');
    el.className='achieve-card'+(unlocked?' unlocked':' locked');
    el.innerHTML=`<div class="icon">${a.icon}</div><div class="name">${unlocked?a.name:'???'}</div><div class="desc">${unlocked?a.desc:'尚未达成'}</div>`;
    g.appendChild(el);
  }
}

// ====== EVENTS ======
document.getElementById('fishWrapper').addEventListener('pointerdown',e=>{e.preventDefault();tap()});
document.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();tap()}});

// Tabs
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('page'+t.dataset.page.charAt(0).toUpperCase()+t.dataset.page.slice(1)).classList.add('active');
  };
});

// Checkin
document.getElementById('checkinBtn').onclick=checkin;

// Sutra
document.getElementById('sutraToggle').onclick=()=>{
  st.sutraOn=!st.sutraOn; LSS('sutraOn',st.sutraOn?'1':'0');
  document.getElementById('sutraSelector').style.display=st.sutraOn?'flex':'none';
  document.getElementById('sutraToggle').textContent=st.sutraOn?'关闭诵经':'开启诵经';
  if(st.sutraOn) renderSutra(); else document.getElementById('sutraText').textContent='轻敲木鱼，随缘诵经';
};
document.querySelectorAll('.sutra-opt').forEach(el=>{
  el.onclick=()=>{
    document.querySelectorAll('.sutra-opt').forEach(e=>e.classList.remove('active'));
    el.classList.add('active');
    st.sutraIdx=el.dataset.s;
    st.sutraPos=0; LSS('sutraKey',st.sutraIdx); LSS('sutraPos',0);
    renderSutra();
  };
});

// ====== INIT ======
(function initStars(){
  const c=document.getElementById('stars');
  for(let i=0;i=50;i++){
    const s=document.createElement('div'); s.className='star';
    s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
    s.style.setProperty('--d',(1+Math.random()*3)+'s');s.style.animationDelay=Math.random()*3+'s';
    c.appendChild(s);
  }
})();

checkDayReset();
st.sutraOn?document.getElementById('sutraSelector').style.display='flex':'';
document.getElementById('sutraToggle').textContent=st.sutraOn?'关闭诵经':'开启诵经';
document.querySelectorAll('.sutra-opt').forEach(el=>el.classList.toggle('active',el.dataset.s===st.sutraIdx));
refreshAll();
if(st.sutraOn) renderSutra();

// ====== PERIODIC OFFLINE CHECK ======
setInterval(()=>{
  st.offlineAccum=calcOffline();
  const oa=document.getElementById('offlineAmount');
  const oc=document.getElementById('offlineClaim');
  if(oa) oa.textContent='+'+st.offlineAccum;
  if(oc){
    if(st.offlineAccum>0){oc.className='offline-claim';oc.onclick=claimOffline;}
    else oc.className='offline-claim hidden';
  }
},5000);
</script>
