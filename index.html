<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>清敲 - 敲木鱼</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a0a2e,#16213e,#0f3460);min-height:100vh;color:#eee;overflow-x:hidden}
.container{max-width:420px;margin:0 auto;padding:16px;position:relative}

/* Header */
.header{display:flex;justify-content:space-between;align-items:center;padding:8px 0 12px}
.header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#e2d5f0,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .stats{display:flex;gap:12px;font-size:13px}
.header .stats span{background:rgba(255,255,255,.08);padding:4px 10px;border-radius:12px;display:flex;align-items:center;gap:4px}

/* Sutra */
.sutra-box{min-height:48px;display:flex;align-items:center;justify-content:center;margin:4px 0 10px;background:rgba(255,255,255,.04);border-radius:10px;padding:8px 12px}
.sutra-text{font-size:14px;color:rgba(255,255,255,.55);text-align:center;line-height:1.6;transition:opacity .15s;letter-spacing:.5px}
.sutra-text .hl{color:#a78bfa}

/* Tap Circle */
.tap-area{text-align:center;padding:16px 0 8px}
.circle-wrap{position:relative;display:inline-block;cursor:pointer}
.circle{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#7c3aed,#4f46e5,#1e1b4b);box-shadow:0 0 60px rgba(124,58,237,.3),0 0 120px rgba(79,70,229,.15),inset 0 -20px 60px rgba(0,0,0,.4);transition:transform .06s;display:flex;align-items:center;justify-content:center;flex-direction:column;animation:pulse 4s ease-in-out infinite}
.circle:active{transform:scale(.92)}
@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(124,58,237,.3)}50%{box-shadow:0 0 80px rgba(124,58,237,.4)}}
.circle .emoji{font-size:56px;line-height:1;margin-bottom:4px}
.circle .label{font-size:13px;color:rgba(255,255,255,.5);letter-spacing:4px}

/* Vibration on hit */
@keyframes shake{0%{transform:scale(.92) translate(0,0)}20%{transform:scale(.92) translate(-3px,0)}40%{transform:scale(.92) translate(3px,0)}60%{transform:scale(.92) translate(-2px,0)}80%{transform:scale(.92) translate(2px,0)}100%{transform:scale(.92) translate(0,0)}}
.circle.hit{animation:shake .12s ease-out}

/* Merit */
.score-area{text-align:center;margin:4px 0 2px}
.score-num{font-size:44px;font-weight:800;background:linear-gradient(180deg,#e2d5f0,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.score-lbl{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:6px;margin-bottom:4px}
.realm{font-size:11px;color:rgba(167,139,250,.5);padding:2px 14px;border:1px solid rgba(167,139,250,.15);border-radius:10px;display:inline-block;letter-spacing:2px}

/* Combo */
.combo-text{text-align:center;font-size:15px;color:#fbbf24;display:none;min-height:20px;margin-bottom:2px}
.combo-text.show{display:block;animation:fadeUp .2s}
@keyframes fadeUp{0%{opacity:0;transform:translateY(5px)}100%{opacity:1;transform:translateY(0)}}

/* Sound Row */
.sound-row{display:flex;gap:5px;margin:8px 0;overflow-x:auto;padding:2px 0;justify-content:center;flex-wrap:wrap}
.snd-btn{padding:5px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.2);color:rgba(255,255,255,.4);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.snd-btn.active{background:rgba(124,58,237,.3);border-color:#7c3aed;color:#c084fc}

/* Tab Bar */
.tab-bar{display:flex;gap:6px;margin:8px 0;padding:4px;background:rgba(255,255,255,.06);border-radius:12px}
.tab{flex:1;text-align:center;padding:8px 0;border-radius:8px;font-size:13px;color:rgba(255,255,255,.4);cursor:pointer;transition:all .2s}
.tab.active{background:rgba(124,58,237,.3);color:#fff}

/* Panels */
.panel{display:none;animation:fadeIn .25s}
.panel.active{display:block}
@keyframes fadeIn{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}

/* Card */
.card{background:rgba(255,255,255,.04);border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid rgba(255,255,255,.06)}
.card h3{font-size:14px;margin-bottom:10px;color:#c084fc;display:flex;align-items:center;gap:6px}

/* Achievements */
.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.ach-item{background:rgba(255,255,255,.04);border-radius:10px;padding:10px 6px;text-align:center;border:1px solid rgba(255,255,255,.04);opacity:.35;transition:all .2s}
.ach-item.unlocked{opacity:1;border-color:rgba(124,58,237,.2);background:rgba(124,58,237,.06)}
.ach-item .icon{font-size:24px;margin-bottom:3px}
.ach-item .name{font-size:10px;color:rgba(255,255,255,.6)}
.ach-item .desc{font-size:8px;color:rgba(255,255,255,.25)}

/* Skins */
.skin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.skin-item{background:rgba(255,255,255,.04);border-radius:12px;padding:12px;text-align:center;border:1px solid rgba(255,255,255,.04)}
.skin-item .preview{width:48px;height:48px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:22px;background:radial-gradient(circle at 35% 35%,#7c3aed,transparent)}
.skin-item .sname{font-size:12px;color:#ddd;margin-bottom:1px}
.skin-item .sdesc{font-size:9px;color:rgba(255,255,255,.3);margin-bottom:6px}
.skin-item .btn-s{width:100%;padding:6px 0;border:0;border-radius:6px;font-size:11px;cursor:pointer}
.skin-item .btn-s.eq{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.skin-item .btn-s.own{background:rgba(124,58,237,.15);color:#c084fc;border:1px solid rgba(124,58,237,.2)}
.skin-item .btn-s.buy{background:linear-gradient(135deg,rgba(124,58,237,.3),rgba(79,70,229,.15));color:#c084fc;border:1px solid rgba(124,58,237,.1)}
.skin-item .btn-s:disabled{opacity:.3;cursor:default}

/* Week */
.week-row{display:flex;gap:3px;justify-content:center;margin-bottom:10px}
.day-box{width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;background:rgba(255,255,255,.04);color:rgba(255,255,255,.2)}
.day-box.done{background:rgba(124,58,237,.2);color:#c084fc;border:1px solid rgba(124,58,237,.15)}
.day-box.today{background:rgba(124,58,237,.08);color:#a78bfa;border:1px solid rgba(124,58,237,.2)}
.btn-c{width:100%;padding:9px;border:0;border-radius:8px;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;font-size:14px;cursor:pointer}
.btn-c:disabled{background:#333;color:#666;cursor:default}

/* Share row */
.share-row{display:flex;gap:8px;margin-top:8px}
.btn-share{flex:1;padding:9px;border:0;border-radius:8px;font-size:13px;cursor:pointer}
.btn-share.p{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff}
.btn-share.s{background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.08)}

/* Stat rows */
.st-row{display:flex;justify-content:space-between;background:rgba(255,255,255,.03);padding:10px 12px;border-radius:8px;margin-bottom:4px}
.st-row .sl{font-size:12px;color:rgba(255,255,255,.35)}
.st-row .sv{font-size:13px;color:#a78bfa}

/* Float */
.floating{position:fixed;pointer-events:none;font-size:20px;font-weight:700;color:#a78bfa;z-index:100;animation:flUp .9s ease-out forwards}
@keyframes flUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(.3)}}

/* Toast */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.88);color:#fff;padding:14px 24px;border-radius:12px;font-size:14px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;text-align:center;backdrop-filter:blur(8px)}
.toast.show{opacity:1}

/* Ach popup */
.ach-pop{position:fixed;top:25%;left:50%;transform:translate(-50%,-50%) scale(.8);background:rgba(0,0,0,.9);color:#fff;padding:20px 28px;border-radius:14px;z-index:150;text-align:center;border:1px solid rgba(124,58,237,.2);opacity:0;transition:all .35s;pointer-events:none;backdrop-filter:blur(8px)}
.ach-pop.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.ach-pop .big{font-size:36px;margin-bottom:6px}
.ach-pop .t{font-size:16px;color:#c084fc}
.ach-pop .d{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px}

@media(max-width:360px){.circle{width:170px;height:170px}.circle .emoji{font-size:46px}.score-num{font-size:36px}}
</style>
</head>
<body>
<div class="container">

<script>
// ============ STATE ============
const K='qq_v4';
function def(){return{merit:0,taps:0,combo:0,maxCombo:0,skin:0,owned:[0],sndIdx:0,checkins:[],streak:0,ach:{},lastTap:0,shareToday:0,shareTotal:0,invCnt:0,shareSkin:false,invSkin:false,firstShare:'',lastVisit:''}}
const ld=()=>{try{const d=localStorage.getItem(K);return d?JSON.parse(d):def()}catch(e){return def()}}
const sv=()=>localStorage.setItem(K,JSON.stringify(s));let s=ld();

// ============ SUTRA ============
const SUT=[
  {n:'心经',l:['观自在菩萨 · 行深般若波罗蜜多时','照见五蕴皆空 · 度一切苦厄','色不异空 · 空不异色','色即是空 · 空即是色','受想行识 · 亦复如是','是诸法空相 · 不生不灭','不垢不净 · 不增不减','无眼耳鼻舌身意','无色声香味触法','无无明 · 亦无无明尽','心无挂碍 · 无有恐怖','远离颠倒梦想 · 究竟涅槃','三世诸佛 · 得阿耨多罗三藐三菩提','是大神咒 · 是大明咒','能除一切苦 · 真实不虚','揭谛揭谛 · 波罗揭谛','波罗僧揭谛 · 菩提萨婆诃']},
  {n:'金刚经',l:['凡所有相 · 皆是虚妄','若见诸相非相 · 即见如来','一切有为法 · 如梦幻泡影','如露亦如电 · 应作如是观','应无所住 · 而生其心','过去心不可得 · 现在心不可得','未来心不可得']},
  {n:'六字大明咒',l:['嗡嘛呢叭咪吽','嗡·嘛·呢·叭·咪·吽']},
  {n:'大悲咒',l:['南无喝啰怛那 · 哆啰夜耶','南无阿唎耶 · 婆卢羯帝','烁钵啰耶 · 菩提萨埵婆耶','唵 · 萨皤啰罚曳','婆卢吉帝 · 室佛啰愣驮婆','摩诃菩提萨埵']},
  {n:'道德经',l:['道可道 · 非常道','名可名 · 非常名','无名天地之始 · 有名万物之母','玄之又玄 · 众妙之门','上善若水 · 水善利万物而不争']},
  {n:'清静经',l:['大道无形 · 生育天地','大道无情 · 运行日月','大道无名 · 长养万物','人能常清静 · 天地悉皆归']},
  {n:'法华经',l:['诸法从本来 · 常自寂灭相','是法住法位 · 世间相常住','诸法实相 · 如是相 · 如是性','开方便门 · 示真实相']}
];
const REALM=[
  {n:'凡人',m:0},{n:'初学',m:100},{n:'修行者',m:300},{n:'入定',m:600},
  {n:'禅定',m:1200},{n:'明心',m:2500},{n:'见性',m:5000},{n:'开悟',m:10000},
  {n:'大觉',m:20000},{n:'菩提',m:40000},{n:'金刚',m:80000},{n:'涅槃',m:150000}
];
const SKIN=[
  {id:0,n:'清净本心',e:'🪷',d:'初始法相'},
  {id:1,n:'紫檀木鱼',e:'🪵',d:'紫檀木制',p:200},
  {id:2,n:'青铜磬',e:'🔔',d:'古铜铸就',p:500},
  {id:3,n:'白玉莲台',e:'💎',d:'白玉雕琢',p:1000},
  {id:4,n:'金钵',e:'🏆',d:'鎏金法钵',p:2000},
  {id:5,n:'分享之心',e:'💝',d:'分享即得',share:true},
  {id:6,n:'友谊之莲',e:'🤝',d:'接引有缘',invite:true}
];
const ACH=[
  {id:'1',n:'初叩',i:'👶',d:'第一次敲击',c:()=>s.taps>=1},
  {id:'2',n:'百敲',i:'🙏',d:'100次',c:()=>s.taps>=100},
  {id:'3',n:'千锤',i:'⚔️',d:'1000次',c:()=>s.taps>=1000},
  {id:'4',n:'万法',i:'☸️',d:'10000次',c:()=>s.taps>=10000},
  {id:'5',n:'五日禅',i:'📅',d:'签到5天',c:()=>s.streak>=5},
  {id:'6',n:'半月修',i:'🗓️',d:'签到15天',c:()=>s.streak>=15},
  {id:'7',n:'一月圆',i:'🌕',d:'签到30天',c:()=>s.streak>=30},
  {id:'8',n:'五连',i:'⚡',d:'5连击',c:()=>s.maxCombo>=5},
  {id:'9',n:'二十连',i:'🔥',d:'20连击',c:()=>s.maxCombo>=20},
  {id:'10',n:'五十连',i:'💫',d:'50连击',c:()=>s.maxCombo>=50},
  {id:'11',n:'百连',i:'👑',d:'100连击',c:()=>s.maxCombo>=100},

  {id:'13',n:'布施',i:'📤',d:'分享10次',c:()=>s.shareTotal>=10},
  {id:'14',n:'大布施',i:'🌟',d:'分享50次',c:()=>s.shareTotal>=50},
  {id:'15',n:'接引',i:'👥',d:'3人',c:()=>s.invCnt>=3}
];

// ============ AUDIO - Physical Model ============
let ctx=null;
function ac(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx}

function playMuyu(){
  const c=ac(),t=c.currentTime;
  const modes=[
    {f:330,a:1.0,d:.45},{f:495,a:.6,d:.38},{f:660,a:.35,d:.30},
    {f:825,a:.2,d:.25},{f:990,a:.12,d:.20},{f:1155,a:.08,d:.16},
    {f:380,a:.25,d:.20},{f:560,a:.15,d:.18}
  ];
  modes.forEach(m=>{
    const o=c.createOscillator(),g=c.createGain();
    o.type='sine';o.frequency.value=m.f;
    g.gain.setValueAtTime(m.a*.55,t);g.gain.exponentialRampToValueAtTime(.001,t+m.d);
    o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+m.d+.05);
  });
  // Strike noise
  const ns=Math.floor(c.sampleRate*.035);
  const b=c.createBuffer(1,ns,c.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<ns;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(ns*.10));
  const src=c.createBufferSource();src.buffer=b;
  const bp=c.createBiquadFilter();bp.type='bandpass';bp.frequency.value=1200;bp.Q.value=3;
  const ng=c.createGain();ng.gain.setValueAtTime(.3,t);ng.gain.exponentialRampToValueAtTime(.001,t+.07);
  src.connect(bp);bp.connect(ng);ng.connect(c.destination);src.start(t);src.stop(t+.09);
  // Reverb tail
  [.03,.07,.12].forEach((dl,i)=>{
    const o=c.createOscillator(),g=c.createGain();
    o.type='sine';o.frequency.value=330+dl*700;
    g.gain.setValueAtTime(.05-i*.015,t+dl);g.gain.exponentialRampToValueAtTime(.001,t+dl+.25+i*.08);
    o.connect(g);g.connect(c.destination);o.start(t+dl);o.stop(t+dl+.35);
  });
}
function playQing(){const c=ac(),t=c.currentTime;[440,660,880,1100].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.22-i*.04,t);g.gain.exponentialRampToValueAtTime(.001,t+1.8+i*.08);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+2.2)})}
function playLing(){const c=ac(),t=c.currentTime;[1200,1600,2000].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.14-i*.03,t);g.gain.exponentialRampToValueAtTime(.001,t+1.0+i*.1);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+1.5)})}
function playWind(){const c=ac(),t=c.currentTime;for(let i=0;i<5;i++){const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=700+i*260;g.gain.setValueAtTime(.07,t+i*.08);g.gain.linearRampToValueAtTime(0,t+i*.08+.3);o.connect(g);g.connect(c.destination);o.start(t+i*.08);o.stop(t+i*.08+.35)}}
function playRain(){const c=ac(),t=c.currentTime;const ns=c.sampleRate*.5;const b=c.createBuffer(1,ns,c.sampleRate),d=b.getChannelData(0);for(let i=0;i<ns;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/ns*5)*.14;const src=c.createBufferSource();src.buffer=b;const g=c.createGain();g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.35);src.connect(g);g.connect(c.destination);src.start(t);src.stop(t+.4)}
function playS(i){if(i==0)playMuyu();else if(i==1)playQing();else if(i==2)playLing();else if(i==3)playWind();else playRain()}

// ============ SUTRA ============
let si=0,li=0;
function nxtS(){
  const b=SUT[si];const ln=b.l[li];
  const el=document.getElementById('sutraText');
  el.style.opacity='0';setTimeout(()=>{el.innerHTML=`<span class="hl">${ln}</span>`;el.style.opacity='1'},40);
  li++;if(li>=b.l.length){li=0;si=(si+1)%SUT.length}
}

// ============ TAP ============
function tap(e){
  const now=Date.now();const diff=now-s.lastTap;s.lastTap=now;
  if(diff<700){s.combo++}else{s.combo=1}
  if(s.combo>s.maxCombo)s.maxCombo=s.combo;
  const pts=1+Math.floor(Math.min(s.combo,20)/5);
  s.merit+=pts;s.taps++;
  playS(s.sndIdx);nxtS();
  
  const ci=document.getElementById('mainCircle');
  ci.classList.remove('hit');void ci.offsetWidth;ci.classList.add('hit');
  setTimeout(()=>ci.classList.remove('hit'),120);
  
  const ct=document.getElementById('comboText');
  if(s.combo>=3){ct.textContent=`🔥 ×${s.combo}`;ct.className='combo-text show';clearTimeout(ct._t);ct._t=setTimeout(()=>ct.className='combo-text',500)}
  
  const rect=ci.getBoundingClientRect();const cx=e.clientX||rect.left+rect.width/2,cy=e.clientY||rect.top+rect.height;
  const fl=document.createElement('div');fl.className='floating';fl.textContent=`+${pts}`;fl.style.left=cx+'px';fl.style.top=cy+'px';
  document.body.appendChild(fl);setTimeout(()=>fl.remove(),900);
  
  chkA();upd();sv();
}

// ============ ACH ============
function chkA(){ACH.forEach(a=>{if(!s.ach[a.id]&&a.c()){s.ach[a.id]=true;const p=document.getElementById('achPop');p.querySelector('.big').textContent=a.i;p.querySelector('.t').textContent=a.n;p.querySelector('.d').textContent=a.d;p.classList.add('show');setTimeout(()=>p.classList.remove('show'),2500)}})}

// ============ SHARE ============
function share(){
  const url=window.location.href;
  if(!s.shareSkin){s.shareSkin=true;if(!s.owned.includes(5))s.owned.push(5);toast('💝 获得「分享之心」法相')}
  const td=new Date().toISOString().slice(0,10);
  if(s.firstShare!==td){s.merit+=50;s.firstShare=td;toast('✨ 每日分享 +50')}
  s.shareToday++;s.shareTotal++;chkA();upd();sv();
  if(navigator.share)navigator.share({title:'清敲',text:'🪷 我在敲木鱼诵经静心，来试试～',url}).catch(()=>{});
  else navigator.clipboard.writeText('🪷 我在「清敲」敲木鱼诵经，来感受静心的力量。 '+url).then(()=>toast('✅ 已复制')).catch(()=>{});
}
function invSim(){s.merit+=30;s.invCnt++;if(!s.invSkin){s.invSkin=true;if(!s.owned.includes(6))s.owned.push(6);toast('🤝 获得「友谊之莲」')}chkA();upd();sv()}

// ============ UI ============
function upd(){
  const td=new Date().toISOString().slice(0,10);
  document.getElementById('hScore').textContent=s.merit;
  document.getElementById('scoreNum').textContent=s.merit;
  const r=REALM.filter(x=>s.merit>=x.m).pop()||REALM[0];
  document.getElementById('realmLabel').textContent=r.n;
  document.getElementById('hStreak').textContent=s.streak>0?`第${s.streak}天`:'未签到';
  const sk=SKIN.find(x=>x.id===s.skin)||SKIN[0];
  document.getElementById('skinEmoji').textContent=sk.e;
  document.querySelectorAll('.snd-btn').forEach(el=>el.classList.toggle('active',parseInt(el.dataset.s)===s.sndIdx));
  // Week
  const rw=document.getElementById('weekRow');const n=new Date();const wd=n.getDay();const st=new Date(n);st.setDate(n.getDate()-wd);
  const nm=['日','一','二','三','四','五','六'];rw.innerHTML='';
  for(let i=0;i<7;i++){const d=new Date(st);d.setDate(st.getDate()+i);const str=d.toISOString().slice(0,10);const div=document.createElement('div');div.className='day-box';if(s.checkins.includes(str))div.className+=' done';else if(str===td)div.className+=' today';div.textContent=nm[i];rw.appendChild(div)}
  const ck=s.checkins.includes(td);const btn=document.getElementById('btnCheck');btn.textContent=ck?'✅ 已签到':'📌 签到 · +50';btn.disabled=ck;
  document.getElementById('stToday').textContent=s.shareToday;document.getElementById('stTotal').textContent=s.shareTotal;document.getElementById('stInvite').textContent=s.invCnt;
  // ACH grid
  const ag=document.getElementById('achGrid');ag.innerHTML='';ACH.forEach(a=>{const u=!!s.ach[a.id];const d=document.createElement('div');d.className=`ach-item${u?' unlocked':''}`;d.innerHTML=`<div class="icon">${a.i}</div><div class="name">${a.n}</div><div class="desc">${a.d}</div>`;ag.appendChild(d)});
  // Shop
  const sg=document.getElementById('skinGrid');sg.innerHTML='';SKIN.forEach(sk=>{const owned=s.owned.includes(sk.id),eq=s.skin===sk.id;const div=document.createElement('div');div.className='skin-item';div.innerHTML=`<div class="preview" style="background:radial-gradient(circle at 35%35%,${sk.id===0?'#7c3aed':sk.id===1?'#8B4513':sk.id===2?'#B8860B':sk.id===3?'#E0E0FF':sk.id===4?'#DAA520':sk.id===5?'#FF69B4':'#F4A460'},transparent)">${sk.e}</div><div class="sname">${sk.n}</div><div class="sdesc">${sk.d||''}</div>`;const btn=document.createElement('button');btn.className='btn-s';if(eq){btn.textContent='✅ 已装备';btn.className='btn-s eq'}else if(owned){btn.textContent='👔 装备';btn.className='btn-s own';btn.onclick=()=>{s.skin=sk.id;upd();sv();upd()}}else if(sk.share&&!s.shareSkin){btn.textContent='📤 分享';btn.className='btn-s buy';btn.onclick=()=>toast('分享给好友即可解锁')}else if(sk.invite&&!s.invSkin){btn.textContent='👥 邀请';btn.className='btn-s buy';btn.onclick=()=>toast('邀请好友解锁')}else if(sk.p>0){btn.textContent=`✦${sk.p}`;btn.className='btn-s buy';btn.onclick=()=>{if(s.merit>=sk.p){s.merit-=sk.p;s.owned.push(sk.id);toast(`✅ 获得「${sk.n}」`);sv();upd()}else toast(`✦不足，还需${sk.p-s.merit}`)}}div.appendChild(btn);sg.appendChild(div)});
  // Stats
  document.getElementById('sTap').textContent=s.taps;document.getElementById('sMer').textContent=s.merit;document.getElementById('sRea').textContent=r.n;document.getElementById('sStr').textContent=s.streak+'天';document.getElementById('sCom').textContent=s.maxCombo+'连';document.getElementById('sSki').textContent=s.owned.length+'/'+SKIN.length;document.getElementById('sAch').textContent=Object.keys(s.ach).length+'/'+ACH.length;
}
function toast(m,d=1500){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d)}

// ============ TABS ============
document.querySelectorAll('.tab').forEach(t=>{t.addEventListener('click',function(){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));this.classList.add('active');const p=document.getElementById(this.dataset.tab);if(p)p.classList.add('active')})});

// ============ INIT ============
document.addEventListener('DOMContentLoaded',()=>{
  nxtS();upd();s.lastVisit=new Date().toISOString();sv();
  document.getElementById('circleWrap').addEventListener('click',function(e){const r=this.getBoundingClientRect();tap({clientX:e.clientX||r.left+r.width/2,clientY:e.clientY||r.top+r.height})});
  document.querySelectorAll('.snd-btn').forEach(el=>{el.addEventListener('click',function(){s.sndIdx=parseInt(this.dataset.s);playS(s.sndIdx);upd();sv()})});
  document.getElementById('btnCheck').addEventListener('click',()=>{const td=new Date().toISOString().slice(0,10);if(s.checkins.includes(td))return;s.checkins.push(td);s.merit+=50;let streak=0;const d=new Date();while(true){const str=d.toISOString().slice(0,10);if(s.checkins.includes(str)){streak++;d.setDate(d.getDate()-1)}else break}s.streak=streak;if(s.streak>s.maxStreak)s.maxStreak=s.streak;sv();chkA();upd();toast(`📌 签到成功！连续${streak}天`)});
  document.getElementById('btnShare').addEventListener('click',share);
  document.getElementById('btnCopy').addEventListener('click',()=>{navigator.clipboard.writeText('🪷 我在「清敲」敲木鱼诵经，来试试～ '+window.location.href).then(()=>toast('✅ 已复制'))});
  // Offline
  if(s.lastVisit){const hrs=(Date.now()-new Date(s.lastVisit).getTime())/3600000;if(hrs>=1){const earn=Math.floor(Math.min(hrs,48)*120);if(earn>5){s.merit+=earn;setTimeout(()=>toast(`🌙 离线 +${earn} 功德`),800)}}}
  // Double-tap invite sim
  let dc=0;document.getElementById('circleWrap').addEventListener('dblclick',()=>{dc++;if(dc>=2){dc=0;invSim();toast('👥 模拟接引')}});
});
</script>
