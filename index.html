<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>清敲 - 正念减压互动</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#eee;overflow-x:hidden}
.container{max-width:420px;margin:0 auto;padding:16px;position:relative}

/* Header */
.header{display:flex;justify-content:space-between;align-items:center;padding:8px 0 12px}
.header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#f0e6ff,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .stats{display:flex;gap:12px;font-size:13px}
.header .stats span{background:rgba(255,255,255,.08);padding:4px 10px;border-radius:12px;display:flex;align-items:center;gap:4px}

/* Tap Circle */
.tap-area{text-align:center;padding:20px 0 10px}
.circle-wrap{position:relative;display:inline-block;cursor:pointer}
.circle{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#7c3aed,#4f46e5,#1e1b4b);box-shadow:0 0 60px rgba(124,58,237,.4),0 0 120px rgba(79,70,229,.2),inset 0 -20px 60px rgba(0,0,0,.4);transition:transform .08s;display:flex;align-items:center;justify-content:center;flex-direction:column;animation:pulse 4s ease-in-out infinite}
.circle:active{transform:scale(.92)}
@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(124,58,237,.4),0 0 120px rgba(79,70,229,.2)}50%{box-shadow:0 0 80px rgba(124,58,237,.5),0 0 160px rgba(79,70,229,.3)}}
.circle .emoji{font-size:60px;line-height:1;margin-bottom:4px}
.circle .label{font-size:14px;color:rgba(255,255,255,.7);letter-spacing:4px}
.score-big{font-size:48px;font-weight:800;color:#f0e6ff;margin:8px 0 4px}
.score-label{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:12px}
.tap-hint{font-size:13px;color:rgba(255,255,255,.4);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:.8}}

/* Floating +score */
.floating{position:fixed;pointer-events:none;font-size:24px;font-weight:700;color:#a78bfa;animation:floatUp 1s ease-out forwards;z-index:100}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(.5)}}

/* Combo */
.combo-bar{text-align:center;margin:4px 0 12px;min-height:24px}
.combo-text{font-size:18px;font-weight:700;color:#f59e0b;display:none}
.combo-text.show{display:inline-block;animation:comboPop .3s ease-out}
@keyframes comboPop{0%{transform:scale(1.5);opacity:.5}100%{transform:scale(1);opacity:1}}

/* Tab Bar */
.tab-bar{display:flex;gap:6px;margin:12px 0;padding:4px;background:rgba(255,255,255,.06);border-radius:12px}
.tab{flex:1;text-align:center;padding:8px 0;border-radius:8px;font-size:13px;color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s}
.tab.active{background:rgba(124,58,237,.4);color:#fff}

/* Panels */
.panel{display:none;animation:fadeIn .3s ease}
.panel.active{display:block}
@keyframes fadeIn{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}

/* Daily Check-in */
.checkin-card{background:rgba(255,255,255,.06);border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid rgba(255,255,255,.06)}
.checkin-card h3{font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.week-row{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
.day-box{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;background:rgba(255,255,255,.05);color:rgba(255,255,255,.3)}
.day-box.done{background:#7c3aed;color:#fff}
.day-box.today{background:rgba(124,58,237,.3);color:#c084fc;border:1px solid #7c3aed}
.btn-checkin{width:100%;padding:10px;border:0;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.btn-checkin:disabled{background:#555;color:#888;cursor:default}

/* Achievements */
.achieve-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.achieve-item{background:rgba(255,255,255,.06);border-radius:12px;padding:12px 8px;text-align:center;border:1px solid rgba(255,255,255,.06);opacity:.4;transition:all .2s}
.achieve-item.unlocked{opacity:1;border-color:#7c3aed;background:rgba(124,58,237,.1)}
.achieve-item .icon{font-size:28px;margin-bottom:4px}
.achieve-item .name{font-size:11px;color:rgba(255,255,255,.7)}
.achieve-item .desc{font-size:9px;color:rgba(255,255,255,.35);margin-top:2px}

/* Skin Shop */
.skin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.skin-item{background:rgba(255,255,255,.06);border-radius:14px;padding:16px;text-align:center;border:1px solid rgba(255,255,255,.06);transition:all .2s}
.skin-item .preview{width:60px;height:60px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:28px}
.skin-item .sname{font-size:13px;color:#ddd;margin-bottom:2px}
.skin-item .sdesc{font-size:10px;color:rgba(255,255,255,.35);margin-bottom:8px}
.skin-item .btn-skin{width:100%;padding:7px 0;border:0;border-radius:8px;font-size:12px;cursor:pointer;transition:all .2s}
.skin-item .btn-skin.equipped{background:rgba(34,197,94,.2);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.skin-item .btn-skin.own{background:rgba(124,58,237,.2);color:#c084fc;border:1px solid rgba(124,58,237,.3)}
.skin-item .btn-skin.buy{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff}
.skin-item .btn-skin:disabled{background:#444;color:#666;cursor:default}
.skin-item .share-unlock{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.3);font-size:11px;padding:6px;border-radius:8px;margin-top:4px}

/* Share Section */
.share-section{background:rgba(255,255,255,.06);border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid rgba(255,255,255,.06);text-align:center}
.share-section h3{font-size:15px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:6px}
.share-section p{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:10px}
.share-btn-row{display:flex;gap:8px;justify-content:center}
.btn-share{padding:10px 20px;border:0;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-share.primary{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}
.btn-share.secondary{background:rgba(255,255,255,.1);color:#ddd;border:1px solid rgba(255,255,255,.15)}
.share-rewards{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.reward-tag{font-size:11px;background:rgba(245,158,11,.1);color:#fbbf24;padding:3px 8px;border-radius:6px}

/* Classic Section */
.classic-list{display:flex;flex-direction:column;gap:8px}
.classic-item{background:rgba(255,255,255,.06);border-radius:12px;padding:14px;border:1px solid rgba(255,255,255,.06)}
.classic-item .title{font-size:14px;color:#c084fc;margin-bottom:4px}
.classic-item .content{font-size:12px;color:rgba(255,255,255,.5);line-height:1.8}

/* Sound Select */
.sound-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding:4px 0}
.sound-btn{padding:6px 14px;border-radius:16px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.sound-btn.active{background:rgba(124,58,237,.3);border-color:#7c3aed;color:#c084fc}

/* Ripples */
.ripple-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50}
.ripple{position:absolute;border-radius:50%;border:2px solid rgba(124,58,237,.3);animation:rippleOut .8s ease-out forwards}
@keyframes rippleOut{0%{width:0;height:0;opacity:.8}100%{width:300px;height:300px;opacity:0;top:-150px;left:-150px}}

/* Toast */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);color:#fff;padding:16px 28px;border-radius:14px;font-size:15px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;text-align:center;backdrop-filter:blur(8px)}
.toast.show{opacity:1}

/* Notification panel */
.notif-panel{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:150;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.notif-panel.show{display:flex}
.notif-box{background:linear-gradient(135deg,#1e1b4b,#312e81);border-radius:20px;padding:28px 24px;max-width:320px;width:90%;text-align:center;border:1px solid rgba(124,58,237,.3)}
.notif-box .big-icon{font-size:48px;margin-bottom:10px}
.notif-box h2{font-size:18px;color:#f0e6ff;margin-bottom:6px}
.notif-box p{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:16px;line-height:1.5}
.notif-box .btn-ok{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;border:0;padding:10px 32px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}

/* Stats tab */
.stat-row{display:flex;justify-content:space-between;background:rgba(255,255,255,.04);padding:12px 14px;border-radius:10px;margin-bottom:6px}
.stat-row .label{font-size:13px;color:rgba(255,255,255,.5)}
.stat-row .value{font-size:14px;font-weight:600;color:#c084fc}

/* Responsive */
@media(max-width:360px){.circle{width:160px;height:160px}.circle .emoji{font-size:48px}.score-big{font-size:36px}}
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>🪷 清敲</h1>
    <div class="stats">
      <span>✦ <span id="statScore">0</span></span>
      <span>🔥 <span id="statDay">第0天</span></span>
    </div>
  </div>

  <!-- Sound Select -->
  <div class="sound-row" id="soundRow">
    <div class="sound-btn active" data-s="0">🪵 清音</div>
    <div class="sound-btn" data-s="1">🔔 磬音</div>
    <div class="sound-btn" data-s="2">🛎️ 铃音</div>
    <div class="sound-btn" data-s="3">🎐 风铃</div>
    <div class="sound-btn" data-s="4">🌧️ 雨声</div>
  </div>

  <!-- Tap Area -->
  <div class="tap-area">
    <div class="circle-wrap" id="tapCircle">
      <div class="circle" id="mainCircle">
        <div class="emoji" id="skinEmoji">🪷</div>
        <div class="label">轻敲一下</div>
      </div>
    </div>
    <div class="combo-bar"><span class="combo-text" id="comboText">🔥 连击 ×5</span></div>
    <div class="score-big" id="tapScore">0</div>
    <div class="score-label">正念分</div>
    <div class="tap-hint" id="tapHint">轻触圆盘 · 静下心来</div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab active" data-tab="tabShare">📤 分享</div>
    <div class="tab" data-tab="tabCheckin">📅 签到</div>
    <div class="tab" data-tab="tabAchieve">🏆 成就</div>
    <div class="tab" data-tab="tabShop">🎨 商城</div>
    <div class="tab" data-tab="tabClassic">📜 名篇</div>
    <div class="tab" data-tab="tabStats">📊 统计</div>
  </div>

  <!-- Panel: Share -->
  <div class="panel active" id="tabShare">
    <div class="share-section">
      <h3>📤 分享清敲 · 一起静心</h3>
      <p>分享给朋友，双方都能获得奖励！</p>
      <div class="share-btn-row">
        <button class="btn-share primary" id="btnShare">📲 分享给好友</button>
        <button class="btn-share secondary" id="btnCopyLink">🔗 复制链接</button>
      </div>
      <div class="share-rewards" id="shareRewards">
        <span class="reward-tag">🎁 首次分享解锁「分享之心」皮肤</span>
        <span class="reward-tag">✨ 每日首次分享 +50分</span>
        <span class="reward-tag">👥 好友通过分享打开，双方各+30分</span>
      </div>
    </div>
    <div class="checkin-card">
      <h3>📤 分享进度</h3>
      <div class="stat-row"><span class="label">今日已分享</span><span class="value"><span id="shareToday">0</span> 次</span></div>
      <div class="stat-row"><span class="label">累计分享</span><span class="value"><span id="shareTotal">0</span> 次</span></div>
      <div class="stat-row"><span class="label">成功邀请</span><span class="value"><span id="shareInvite">0</span> 人</span></div>
    </div>
  </div>

  <!-- Panel: Check-in -->
  <div class="panel" id="tabCheckin">
    <div class="checkin-card">
      <h3>📅 每日签到</h3>
      <div class="week-row" id="weekRow"></div>
      <button class="btn-checkin" id="btnCheckin">📌 签到 +50 分</button>
    </div>
  </div>

  <!-- Panel: Achievements -->
  <div class="panel" id="tabAchieve">
    <div class="achieve-grid" id="achieveGrid"></div>
  </div>

  <!-- Panel: Shop -->
  <div class="panel" id="tabShop">
    <div class="skin-grid" id="skinGrid"></div>
  </div>

  <!-- Panel: Classics -->
  <div class="panel" id="tabClassic">
    <div class="classic-list" id="classicList"></div>
  </div>

  <!-- Panel: Stats -->
  <div class="panel" id="tabStats">
    <div class="checkin-card">
      <h3>📊 练习统计</h3>
      <div class="stat-row"><span class="label">总敲击次数</span><span class="value" id="sTotalTap">0</span></div>
      <div class="stat-row"><span class="label">总正念分</span><span class="value" id="sTotalScore">0</span></div>
      <div class="stat-row"><span class="label">连续签到</span><span class="value" id="sStreak">0 天</span></div>
      <div class="stat-row"><span class="label">已解锁皮肤</span><span class="value" id="sSkins">0</span></div>
      <div class="stat-row"><span class="label">已获得成就</span><span class="value" id="sAchieves">0</span></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Notification Panel -->
<div class="notif-panel" id="notifPanel">
  <div class="notif-box">
    <div class="big-icon" id="notifIcon">🎉</div>
    <h2 id="notifTitle">恭喜！</h2>
    <p id="notifDesc">你获得了新成就</p>
    <button class="btn-ok" id="notifOk">太好了！</button>
  </div>
</div>

<!-- Ripple Container -->
<div class="ripple-container" id="rippleContainer"></div>

<script>
// =================== STATE ===================
const STATE_KEY = 'qingqiao_h5_data';
function getDefaultState() {
  return {
    score: 0,
    totalTaps: 0,
    combo: 0,
    maxCombo: 0,
    skin: 0,
    ownedSkins: [0],
    soundIdx: 0,
    checkinDays: [], // ['2026-05-27', ...]
    checkedInToday: false,
    streak: 0,
    maxStreak: 0,
    shareToday: 0,
    shareTotal: 0,
    shareInvite: 0,
    sharedSkinUnlocked: false,
    inviteSkinUnlocked: false,
    achievements: {},
    lastTapTime: 0,
    lastCheckinDate: '',
    firstShareDate: '',
    lastVisitDate: '',
    offlineScore: 0,
  };
}
function loadState(){
  try{
    const raw = localStorage.getItem(STATE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return getDefaultState();
}
function saveState(){
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
}

let state = loadState();

// =================== CONSTANTS ===================
const SKINS = [
  {id:0, name:'初入清心', emoji:'🪷', desc:'初始皮肤', price:0, shareUnlock:false, inviteUnlock:false},
  {id:1, name:'竹林清风', emoji:'🎋', desc:'翠竹心境', price:200, shareUnlock:false, inviteUnlock:false},
  {id:2, name:'月华如水', emoji:'🌙', desc:'月光如水', price:500, shareUnlock:false, inviteUnlock:false},
  {id:3, name:'雪山禅韵', emoji:'🏔️', desc:'雪山之巅', price:1000, shareUnlock:false, inviteUnlock:false},
  {id:4, name:'星辰大海', emoji:'🌌', desc:'璀璨星河', price:2000, shareUnlock:false, inviteUnlock:false},
  {id:5, name:'分享之心', emoji:'💝', desc:'首次分享解锁', price:0, shareUnlock:true, inviteUnlock:false},
  {id:6, name:'友情之约', emoji:'🤝', desc:'邀请好友解锁', price:0, shareUnlock:false, inviteUnlock:true},
];
const ACHIEVEMENTS = [
  {id:'first_tap', name:'初次静心', icon:'👶', desc:'第一次敲击', check:()=>state.totalTaps>=1},
  {id:'hundred', name:'百敲百练', icon:'💪', desc:'累计敲击100次', check:()=>state.totalTaps>=100},
  {id:'thousand', name:'千锤百炼', icon:'⚔️', desc:'累计敲击1000次', check:()=>state.totalTaps>=1000},
  {id:'five_streak', name:'连续5天', icon:'📅', desc:'连续签到5天', check:()=>state.streak>=5},
  {id:'fifteen_streak', name:'半月坚持', icon:'🗓️', desc:'连续签到15天', check:()=>state.streak>=15},
  {id:'thirty_streak', name:'月满清心', icon:'🌕', desc:'连续签到30天', check:()=>state.streak>=30},
  {id:'combo5', name:'五连击', icon:'⚡', desc:'达到5连击', check:()=>state.maxCombo>=5},
  {id:'combo20', name:'二十连击', icon:'🔥', desc:'达到20连击', check:()=>state.maxCombo>=20},
  {id:'combo50', name:'五十连击', icon:'💫', desc:'达到50连击', check:()=>state.maxCombo>=50},
  {id:'collect_all', name:'收集达人', icon:'🎨', desc:'拥有6个皮肤', check:()=>state.ownedSkins.length>=6},
  {id:'share_10', name:'分享达人', icon:'📤', desc:'累计分享10次', check:()=>state.shareTotal>=10},
  {id:'share_50', name:'清敲大使', icon:'🌟', desc:'累计分享50次', check:()=>state.shareTotal>=50},
];
const CLASSICS = [
  {title:'《心经》节选', content:'观自在菩萨，行深般若波罗蜜多时，照见五蕴皆空，度一切苦厄。舍利子，色不异空，空不异色，色即是空，空即是色，受想行识，亦复如是。'},
  {title:'《金刚经》节选', content:'凡所有相，皆是虚妄。若见诸相非相，即见如来。一切有为法，如梦幻泡影，如露亦如电，应作如是观。'},
  {title:'《道德经》节选', content:'道可道，非常道；名可名，非常名。无名天地之始，有名万物之母。故常无欲，以观其妙；常有欲，以观其徼。'},
  {title:'《大学》节选', content:'大学之道，在明明德，在亲民，在止于至善。知止而后有定，定而后能静，静而后能安，安而后能虑，虑而后能得。'},
  {title:'《论语》节选', content:'学而时习之，不亦说乎？有朋自远方来，不亦乐乎？人不知而不愠，不亦君子乎？'},
  {title:'《中庸》节选', content:'喜怒哀乐之未发，谓之中；发而皆中节，谓之和。中也者，天下之大本也；和也者，天下之达道也。'},
];
const SOUND_NAMES = ['清音·木', '磬音·金', '铃音·铜', '风铃·竹', '雨声·水'];

// =================== AUDIO (Web Audio API) ===================
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playSound(idx){
  const ctx = getAudioCtx();
  function noop(){}
  switch(idx){
    case 0:{ // wooden
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type='triangle'; osc.frequency.setValueAtTime(400,ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(200,ctx.currentTime+.05);
      gain.gain.setValueAtTime(.4,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);
      osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime+.3);
      break;
    }
    case 1:{ // bowl
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type='sine'; osc.frequency.setValueAtTime(880,ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(440,ctx.currentTime+.5);
      gain.gain.setValueAtTime(.3,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+1.5);
      const osc2 = ctx.createOscillator(); const gain2 = ctx.createGain();
      osc2.type='sine'; osc2.frequency.setValueAtTime(1320,ctx.currentTime); osc2.frequency.exponentialRampToValueAtTime(660,ctx.currentTime+.5);
      gain2.gain.setValueAtTime(.15,ctx.currentTime); gain2.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+1);
      osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime+1.5);
      osc2.connect(gain2); gain2.connect(ctx.destination); osc2.start(); osc2.stop(ctx.currentTime+1);
      break;
    }
    case 2:{ // bell
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type='sine'; osc.frequency.setValueAtTime(1200,ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(600,ctx.currentTime+.8);
      gain.gain.setValueAtTime(.25,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+2);
      const osc2 = ctx.createOscillator(); const gain2 = ctx.createGain();
      osc2.type='sine'; osc2.frequency.setValueAtTime(1800,ctx.currentTime);
      gain2.gain.setValueAtTime(.1,ctx.currentTime); gain2.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+1.5);
      osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime+2);
      osc2.connect(gain2); gain2.connect(ctx.destination); osc2.start(); osc2.stop(ctx.currentTime+1.5);
      break;
    }
    case 3:{ // wind chime
      for(let i=0;i<5;i++){
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.type='sine'; const freq = 800 + i*300 + Math.random()*50;
        osc.frequency.setValueAtTime(freq,ctx.currentTime + i*.1);
        gain.gain.setValueAtTime(.12,ctx.currentTime + i*.1); gain.gain.linearRampToValueAtTime(0,ctx.currentTime + i*.1 + .5);
        osc.connect(gain); gain.connect(ctx.destination); osc.start(ctx.currentTime + i*.1); osc.stop(ctx.currentTime + i*.1 + .5);
      }
      break;
    }
    case 4:{ // rain
      const bufferSize = ctx.sampleRate * .8;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for(let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1) * Math.exp(-i/bufferSize*8) * .15;
      const source = ctx.createBufferSource();
      source.buffer = buffer;
      const gain = ctx.createGain(); gain.gain.setValueAtTime(.3,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.6);
      source.connect(gain); gain.connect(ctx.destination); source.start();
      break;
    }
  }
}

// =================== UI HELPERS ===================
function showToast(msg, duration=1500){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), duration);
}
function showNotif(icon, title, desc, cb){
  document.getElementById('notifIcon').textContent = icon;
  document.getElementById('notifTitle').textContent = title;
  document.getElementById('notifDesc').textContent = desc;
  document.getElementById('notifPanel').classList.add('show');
  document.getElementById('notifOk').onclick = ()=>{
    document.getElementById('notifPanel').classList.remove('show');
    if(cb) cb();
  };
}
function addFloatingScore(x, y, text){
  const el = document.createElement('div');
  el.className = 'floating'; el.textContent = text;
  el.style.left = x+'px'; el.style.top = y+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1000);
}
function addRipple(x, y){
  const el = document.createElement('div');
  el.className = 'ripple'; el.style.left=x+'px'; el.style.top=y+'px';
  document.getElementById('rippleContainer').appendChild(el);
  setTimeout(()=>el.remove(), 800);
}

// =================== CHECK ACHIEVEMENTS ===================
function checkAchievements(){
  let newOne = false;
  ACHIEVEMENTS.forEach(a=>{
    if(!state.achievements[a.id] && a.check()){
      state.achievements[a.id]=true;
      newOne=true;
      setTimeout(()=>showNotif('🏆','成就解锁！',`「${a.name}」- ${a.desc}`), 300);
    }
  });
  return newOne;
}

// =================== TAP ===================
function handleTap(e){
  const now = Date.now();
  const diff = now - state.lastTapTime;
  state.lastTapTime = now;
  if(diff < 600){
    state.combo++;
    if(state.combo>state.maxCombo) state.maxCombo=state.combo;
  } else {
    state.combo=1;
  }

  const bonus = Math.min(state.combo, 20);
  const pts = 1 + Math.floor(bonus/5);
  state.score += pts;
  state.totalTaps++;

  // Generate sound
  playSound(state.soundIdx);

  // Combo display
  const ct = document.getElementById('comboText');
  if(state.combo>=3){
    ct.textContent = `🔥 连击 ×${state.combo}`;
    ct.className = 'combo-text show';
    clearTimeout(ct._t);
    ct._t = setTimeout(()=>ct.className='combo-text', 800);
  }

  // Visual feedback
  const rect = document.getElementById('mainCircle').getBoundingClientRect();
  const cx = rect.left+rect.width/2;
  const cy = rect.top+rect.height/2;
  addFloatingScore(cx, cy-10, `+${pts}`);
  addRipple(e.clientX, e.clientY);
  checkAchievements();
  updateUI();
  saveState();
}

// =================== SHARE ===================
function handleShare(){
  const url = window.location.href;
  const text = '🪷 我正在用「清敲」练习正念减压，轻敲一下就能静下心来！来试试吧～';

  // First share unlock
  if(!state.sharedSkinUnlocked){
    state.sharedSkinUnlocked = true;
    if(!state.ownedSkins.includes(5)) state.ownedSkins.push(5);
    setTimeout(()=>showNotif('💝','解锁皮肤！','「分享之心」已加入你的收藏'), 500);
  }

  // Daily first share bonus
  const today = new Date().toISOString().slice(0,10);
  if(state.firstShareDate !== today){
    state.score += 50;
    state.firstShareDate = today;
    setTimeout(()=>showToast('✨ 每日首次分享 +50 分！'), 100);
  }

  state.shareToday++;
  state.shareTotal++;

  checkAchievements();

  // Try Web Share API
  if(navigator.share){
    navigator.share({title:'清敲', text, url}).catch(()=>{});
  } else {
    // Fallback: copy to clipboard
    navigator.clipboard.writeText(text + ' ' + url).then(()=>{
      showToast('✅ 链接已复制，快去分享给好友吧！');
    }).catch(()=>{
      showToast('📤 分享链接：' + url);
    });
  }

  updateUI();
  saveState();
}

function handleCopyLink(){
  const url = window.location.href;
  navigator.clipboard.writeText('🪷 我正在用「清敲」练习正念减压，轻敲一下就能静下心来！来试试吧～ ' + url).then(()=>{
    showToast('✅ 链接已复制到剪贴板！');
  }).catch(()=>{
    showToast('📤 复制失败，请手动复制：' + url);
  });
}

// =================== CHECK-IN ===================
const DAY_NAMES = ['日','一','二','三','四','五','六'];
function renderWeek(){
  const row = document.getElementById('weekRow');
  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);
  const weekday = today.getDay();
  const startDate = new Date(today);
  startDate.setDate(today.getDate() - weekday);

  row.innerHTML = '';
  for(let i=0;i<7;i++){
    const d = new Date(startDate);
    d.setDate(startDate.getDate()+i);
    const str = d.toISOString().slice(0,10);
    const div = document.createElement('div');
    div.className = 'day-box';
    if(state.checkinDays.includes(str)) div.className='day-box done';
    else if(str===todayStr) div.className='day-box today';
    div.textContent = DAY_NAMES[i];
    row.appendChild(div);
  }
}
function handleCheckin(){
  const today = new Date().toISOString().slice(0,10);
  if(state.checkinDays.includes(today)){
    showToast('今天已签到～');
    return;
  }
  state.checkinDays.push(today);
  state.checkedInToday = true;
  state.score += 50;

  // Calculate streak
  let streak = 0;
  const d = new Date();
  while(true){
    const str = d.toISOString().slice(0,10);
    if(state.checkinDays.includes(str)){
      streak++; d.setDate(d.getDate()-1);
    } else break;
  }
  state.streak = streak;
  if(state.streak > state.maxStreak) state.maxStreak = state.streak;

  showToast('📌 签到成功 +50 分！连续 ' + streak + ' 天');
  checkAchievements();
  updateUI();
  saveState();
}

// =================== SKIN SHOP ===================
function renderShop(){
  const grid = document.getElementById('skinGrid');
  grid.innerHTML = '';
  SKINS.forEach(s=>{
    const div = document.createElement('div');
    div.className = 'skin-item';
    const owned = state.ownedSkins.includes(s.id);
    const equipped = state.skin === s.id;
    div.innerHTML = `
      <div class="preview" style="background:radial-gradient(circle at 35% 35%,${s.id===0?'#7c3aed':s.id===1?'#22c55e':s.id===2?'#eab308':s.id===3?'#fff':s.id===4?'#06b6d4':s.id===5?'#ec4899':'#f59e0b'},transparent)">${s.emoji}</div>
      <div class="sname">${s.name}</div>
      <div class="sdesc">${s.desc}</div>
    `;
    const btn = document.createElement('button');
    btn.className = 'btn-skin';
    if(equipped){
      btn.textContent = '✅ 已装备';
      btn.className = 'btn-skin equipped';
    } else if(owned){
      btn.textContent = '👔 装备';
      btn.className = 'btn-skin own';
      btn.onclick = ()=>{ state.skin = s.id; updateUI(); saveState(); };
    } else if(s.shareUnlock && !state.sharedSkinUnlocked){
      btn.textContent = '📤 分享解锁';
      btn.className = 'btn-skin buy';
      btn.onclick = ()=>{
        document.querySelector('[data-tab="tabShare"]').click();
        showToast('📤 分享给好友即可解锁！');
      };
    } else if(s.inviteUnlock && !state.inviteSkinUnlocked){
      btn.textContent = '👥 邀请好友解锁';
      btn.className = 'btn-skin buy';
      btn.onclick = ()=>{
        document.querySelector('[data-tab="tabShare"]').click();
        showToast('👥 好友通过分享打开页面即可解锁！');
      };
    } else if(s.price > 0){
      btn.textContent = `✦ ${s.price} 购买`;
      btn.className = 'btn-skin buy';
      btn.onclick = ()=>{
        if(state.score >= s.price){
          state.score -= s.price;
          state.ownedSkins.push(s.id);
          showToast(`✅ 已购买「${s.name}」！`);
          updateUI(); saveState();
        } else {
          showToast(`✦ 不足，还需 ${s.price - state.score} 分`);
        }
      };
    } else {
      btn.textContent = '🔒 不可用';
      btn.disabled = true;
    }
    div.appendChild(btn);

    // Special badge for share/invite skins
    if(s.id!==0 && s.shareUnlock && !state.sharedSkinUnlocked){
      const badge = document.createElement('div');
      badge.className = 'share-unlock';
      badge.textContent = '🎁 分享即可免费获得';
      div.appendChild(badge);
    }
    if(s.id!==0 && s.inviteUnlock && !state.inviteSkinUnlocked){
      const badge = document.createElement('div');
      badge.className = 'share-unlock';
      badge.textContent = '👥 邀请1位好友即可获得';
      div.appendChild(badge);
    }

    grid.appendChild(div);
  });
}

// =================== ACHIEVEMENTS UI ===================
function renderAchieves(){
  const grid = document.getElementById('achieveGrid');
  grid.innerHTML = '';
  ACHIEVEMENTS.forEach(a=>{
    const unlocked = !!state.achievements[a.id];

      <div class="icon">${a.icon}</div>

  list.innerHTML = '';
  CLASSICS.forEach(c=>{

// =================== TAB SWITCH ===================
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click', function(){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    this.classList.add('active');
    const target = document.getElementById(this.dataset.tab);
    if(target) target.classList.add('active');
  });
});

// =================== UPDATE UI ===================
function updateUI(){
  const today = new Date().toISOString().slice(0,10);

  // Score
  document.getElementById('statScore').textContent = state.score;
  document.getElementById('tapScore').textContent = state.score;

  // Day streak
  document.getElementById('statDay').textContent = state.streak>0 ? `第${state.streak}天` : '未签到';

  // Skin emoji
  const currentSkin = SKINS.find(s=>s.id===state.skin) || SKINS[0];
  document.getElementById('skinEmoji').textContent = currentSkin.emoji;

  // Check-in
  renderWeek();
  const checkedIn = state.checkinDays.includes(today);
  const btn = document.getElementById('btnCheckin');
  btn.textContent = checkedIn ? '✅ 今日已签到' : '📌 签到 +50 分';
  btn.disabled = checkedIn;

  // Share
  document.getElementById('shareToday').textContent = state.shareToday;
  document.getElementById('shareTotal').textContent = state.shareTotal;
  document.getElementById('shareInvite').textContent = state.shareInvite;

  // Sound
  document.querySelectorAll('.sound-btn').forEach(el=>{
    el.classList.toggle('active', parseInt(el.dataset.s)===state.soundIdx);
  });

  // Achievements
  renderAchieves();

  // Shop
  renderShop();

  // Stats
  document.getElementById('sTotalTap').textContent = state.totalTaps;
  document.getElementById('sTotalScore').textContent = state.score;
  document.getElementById('sStreak').textContent = state.streak + ' 天';
  document.getElementById('sSkins').textContent = state.ownedSkins.length + '/' + SKINS.length;
  document.getElementById('sAchieves').textContent = Object.keys(state.achievements).length + '/' + ACHIEVEMENTS.length;
}

// =================== OFFLINE SCORE ===================
function calcOfflineScore(){
  if(!state.lastVisitDate) return;
  const now = new Date();
  const last = new Date(state.lastVisitDate);
  const hoursDiff = (now - last) / (1000*60*60);
  if(hoursDiff < 1) return;
  const maxHours = 48;
  const effective = Math.min(hoursDiff, maxHours);
  const earned = Math.floor(effective * 120); // 120 per hour = 2 per minute = 1 per 30s
  if(earned > 5){
    state.score += earned;
    state.offlineScore = earned;
    setTimeout(()=>showToast(`🌙 离线收益 +${earned} 正念分（离开 ${Math.floor(hoursDiff)} 小时）`), 500);
  }
}

// =================== GUEST INVITE (simulate friend opening) ===================
// Check URL params for invite
function checkInviteParam(){
  const params = new URLSearchParams(window.location.search);
  if(params.get('invited_by')){
    // Simulate being invited
    setTimeout(()=>{
      showToast('👥 好友邀请！+30 正念分');
      state.score += 30;
      if(!state.inviteSkinUnlocked){
        state.inviteSkinUnlocked = true;
        if(!state.ownedSkins.includes(6)) state.ownedSkins.push(6);
        setTimeout(()=>showNotif('🤝','解锁皮肤！','「友情之约」已加入你的收藏 — 通过好友邀请开启！'), 1000);
      }
      updateUI();
      saveState();
    }, 500);
  }
}

// =================== INIT ===================
function init(){
  calcOfflineScore();
  checkInviteParam();
  updateUI();
  state.lastVisitDate = new Date().toISOString();
  saveState();

  // Tap handler
  document.getElementById('tapCircle').addEventListener('click', function(e){
    handleTap({clientX: e.clientX, clientY: e.clientY});
  });

  // Sound select
  document.querySelectorAll('.sound-btn').forEach(el=>{
    el.addEventListener('click', function(){
      state.soundIdx = parseInt(this.dataset.s);
      playSound(state.soundIdx);
      updateUI();
      saveState();
    });
  });

  // Share
  document.getElementById('btnShare').addEventListener('click', handleShare);
  document.getElementById('btnCopyLink').addEventListener('click', handleCopyLink);

  // Checkin
  document.getElementById('btnCheckin').addEventListener('click', handleCheckin);

  // Quick test: click 5 times quickly to simulate invite (for testing)
  let debugClicks = 0;
  document.getElementById('tapCircle').addEventListener('dblclick', function(){
    debugClicks++;
    if(debugClicks >= 3){
      debugClicks = 0;
      simulateInvite();
    }
  });
}

document.addEventListener('DOMContentLoaded', init);
